function DoctorAvatar({doctor,size=36}){

}

function useTable(table,orderCol='created_at',orderAsc=false){
  const[data,setData]=useState([]);
  const[loading,setLoading]=useState(true);
  const load=useCallback(async()=>{
    setLoading(true);
    const{data:rows}=await db.from(table).select('*').order(orderCol,{ascending:orderAsc});
    setData(rows||[]);setLoading(false);
  },[table]);
  useEffect(()=>{load();},[load]);
  const insert=async row=>{const{data:ins}=await db.from(table).insert(row).select().single();setData(p=>[ins,...p]);return ins;};
  const update=async(id,ch)=>{await db.from(table).update(ch).eq('id',id);setData(p=>p.map(r=>r.id===id?{...r,...ch}:r));};
  const remove=async id=>{await db.from(table).delete().eq('id',id);setData(p=>p.filter(r=>r.id!==id));};
  return{data,loading,load,insert,update,remove};
}

function DoctorsTab({doctors}){

    <textarea placeholder="Описание..." rows={3} value={form.description} onChange={e=>setForm({...form,description:e.target.value})} style={{resize:'none'}}/>

    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{DC.map(col=><div key={col} onClick={()=>setForm({...form,color:col})} style={{width:28,height:28,borderRadius:'50%',background:col,cursor:'pointer',border:form.color===col?'3px solid #fff':'3px solid transparent'}}/>)}</div>

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><span style={{fontFamily:'Syne',fontWeight:700,fontSize:16}}>Врачи ({doctors.data.length})</span><Btn small onClick={()=>{setForm({...ef,color:DC[doctors.data.length%DC.length]});setShowAdd(true);}}>+ Добавить</Btn></div>

      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {doctors.data.map(d=><div key={d.id} onClick={()=>setSel(d)} style={{background:C.card,border:`1.5px solid ${d.active?d.color+'44':C.border}`,borderRadius:16,padding:'14px 16px',cursor:'pointer',opacity:d.active?1:.55}}>
          <div style={{display:'flex',gap:12,alignItems:'center'}}><DoctorAvatar doctor={d} size={44}/><div style={{flex:1,minWidth:0}}><div style={{fontFamily:'Syne',fontWeight:700,fontSize:15}}>{d.name}</div>{d.specialty&&<div style={{color:d.color,fontSize:13,marginTop:2}}>{d.specialty}</div>}<div style={{color:C.muted,fontSize:12,marginTop:2}}>{d.work_start}–{d.work_end}</div></div>

    </Modal>}
    {editing&&<Modal title="Редактировать" onClose={()=>setEditing(false)}><FormBody/></Modal>}
  </div>;
}

function FinancesTab({payments,patients,doctors}){
  const[showAdd,setShowAdd]=useState(false);const[filter,setFilter]=useState('all');

  const total=payments.data.reduce((s,p)=>s+(p.status==='Оплачено'?Number(p.amount):0),0);
  const pend=payments.data.reduce((s,p)=>s+(p.status==='Ожидает'?Number(p.amount):0),0);
  const debt=payments.data.reduce((s,p)=>s+(p.status==='Долг'?Number(p.amount):0),0);
  const shown=filter==='all'?payments.data:payments.data.filter(p=>p.status===filter);
  const cycle={Ожидает:'Оплачено',Оплачено:'Долг',Долг:'Ожидает'};
  const add=async()=>{if(!form.patient_name.trim()||!form.amount)return;setSaving(true);await payments.insert(form);setForm({patient_name:'',doctor_name:'',service:'',amount:'',status:'Ожидает',date:today()});setShowAdd(false);setSaving(false);};
  return <div>
    <div style={{display:'flex',gap:8,marginBottom:14}}>
      {[{l:'Оплачено',v:total,c:C.green},{l:'Ожидает',v:pend,c:C.orange},{l:'Долг',v:debt,c:C.red}].map(({l,v,c})=>(
        <div key={l} style={{flex:1,background:C.card,border:`1px solid ${c}33`,borderRadius:14,padding:'12px 8px',textAlign:'center'}}><div style={{color:c,fontSize:10,marginBottom:4}}>{l}</div><div style={{fontFamily:'Syne',fontWeight:700,fontSize:14,color:c}}>{v.toLocaleString()} ₽</div></div>
      ))}
    </div>
    <div style={{display:'flex',gap:8,marginBottom:12,overflowX:'auto'}}>
      {['all','Оплачено','Ожидает','Долг'].map(f=><div key={f} onClick={()=>setFilter(f)} style={{background:filter===f?C.accent+'22':C.card,border:`1.5px solid ${filter===f?C.accent:C.border}`,borderRadius:20,padding:'5px 14px',cursor:'pointer',whiteSpace:'nowrap',fontSize:12,color:filter===f?C.accent:C.muted,fontWeight:600,flexShrink:0}}>{f==='all'?'Все':f}</div>)}
      <div style={{marginLeft:'auto',flexShrink:0}}><Btn small onClick={()=>setShowAdd(true)}>+ Платёж</Btn></div>
    </div>
    {payments.loading?<Spinner/>:shown.length===0?<div style={{textAlign:'center',color:C.muted,padding:40}}>Нет платежей</div>:(
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {shown.map(p=><div key={p.id} onClick={()=>payments.update(p.id,{status:cycle[p.status]})} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:'14px 16px',cursor:'pointer'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontFamily:'Syne',fontWeight:600}}>{p.patient_name}</span><span style={{fontFamily:'Syne',fontWeight:700,color:PAY_C[p.status]}}>{Number(p.amount).toLocaleString()} ₽</span></div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6,gap:8}}><span style={{color:C.muted,fontSize:13}}>{p.doctor_name||p.service||p.date}</span><Badge text={p.status} color={PAY_C[p.status]}/></div>
        </div>)}
      </div>
    )}
    {showAdd&&<Modal title="Новый платёж" onClose={()=>setShowAdd(false)}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>

        <datalist id="fp2">{patients.data.map(p=><option key={p.id} value={p.name}/>)}</datalist>

        <input placeholder="Услуга" value={form.service} onChange={e=>setForm({...form,service:e.target.value})}/>
        <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/>
        <select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>{Object.keys(PAY_C).map(s=><option key={s}>{s}</option>)}</select>

      </div>
    </Modal>}
  </div>;

function TasksTab({tasks,doctors}){
  const[showAdd,setShowAdd]=useState(false);const[filter,setFilter]=useState('active');
  const[form,setForm]=useState({title:'',assignee:'',priority:'Средний',due_date:'',notes:''});const[saving,setSaving]=useState(false);
  const PRIO_C={'Высокий':C.red,'Средний':C.orange,'Низкий':C.green};
  const shown=tasks.data.filter(t=>filter==='active'?!t.done:t.done);
  const overdue=t=>!t.done&&t.due_date&&t.due_date<today();
  const save=async()=>{if(!form.title.trim())return;setSaving(true);await tasks.insert({...form,done:false,created_at:today()});setForm({title:'',assignee:'',priority:'Средний',due_date:'',notes:''});setShowAdd(false);setSaving(false);};
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><span style={{fontFamily:'Syne',fontWeight:700,fontSize:16}}>Задачи</span><Btn small onClick={()=>setShowAdd(true)}>+ Задача</Btn></div>
    <div style={{display:'flex',gap:8,marginBottom:14}}>
      {[{id:'active',l:`Активные (${tasks.data.filter(t=>!t.done).length})`},{id:'done',l:`Выполнено (${tasks.data.filter(t=>t.done).length})`}].map(f=>(
        <div key={f.id} onClick={()=>setFilter(f.id)} style={{background:filter===f.id?C.accent+'22':C.card,border:`1.5px solid ${filter===f.id?C.accent:C.border}`,borderRadius:20,padding:'6px 14px',cursor:'pointer',fontSize:12,color:filter===f.id?C.accent:C.muted,fontWeight:600}}>{f.l}</div>
      ))}
    </div>
    {tasks.loading?<Spinner/>:shown.length===0?<div style={{textAlign:'center',color:C.muted,padding:40}}>Задач нет</div>:(
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {shown.map(t=><div key={t.id} style={{background:C.card,border:`1px solid ${overdue(t)?C.red:C.border}`,borderRadius:14,padding:'12px 14px'}}>
          <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
            <div onClick={()=>tasks.update(t.id,{done:!t.done})} style={{width:22,height:22,borderRadius:6,border:`2px solid ${t.done?C.green:C.border}`,background:t.done?C.green+'33':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,marginTop:1,color:C.green,fontSize:14}}>{t.done?'✓':''}</div>
            <div style={{flex:1}}><div style={{fontWeight:600,textDecoration:t.done?'line-through':'none',color:t.done?C.muted:C.text}}>{t.title}</div>
            <div style={{display:'flex',gap:8,marginTop:4,flexWrap:'wrap',alignItems:'center'}}>{t.assignee&&<span style={{fontSize:11,color:C.muted}}>{t.assignee}</span>}<Badge text={t.priority} color={PRIO_C[t.priority]||C.muted}/>{t.due_date&&<span style={{fontSize:11,color:overdue(t)?C.red:C.muted}}>{overdue(t)?'⚠ ':''}{t.due_date}</span>}</div></div>
            <button onClick={()=>tasks.remove(t.id)} style={{background:'none',color:C.muted,fontSize:18,padding:0,flexShrink:0}}>×</button>
          </div>
        </div>)}
      </div>
    )}
    {showAdd&&<Modal title="Новая задача" onClose={()=>setShowAdd(false)}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <input placeholder="Задача *" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
        <input placeholder="Ответственный" value={form.assignee} onChange={e=>setForm({...form,assignee:e.target.value})} list="dnames2"/>
        <datalist id="dnames2">{doctors.data.map(d=><option key={d.id} value={d.name}/>)}</datalist>
        <select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})}><option>Высокий</option><option>Средний</option><option>Низкий</option></select>
        <input type="date" value={form.due_date} onChange={e=>setForm({...form,due_date:e.target.value})}/>
        <Btn onClick={save} full disabled={saving}>{saving?'Сохранение...':'Добавить'}</Btn>
      </div>
    </Modal>}
  </div>;
}

function App(){
  const[tab,setTab]=useState('dashboard');const[menuOpen,setMenuOpen]=useState(false);
  const doctors=useTable('clinic_doctors','created_at',true);
  const patients=useTable('clinic_patients','created_at',false);
  const appts=useTable('clinic_appointments','created_at',false);
  const payments=useTable('clinic_payments','created_at',false);
  const emr=useTable('clinic_emr','created_at',false);
  const tasks=useTable('clinic_tasks','created_at',false);
  const todayCnt=appts.data.filter(a=>a.date===today()).length;
  const overdueCnt=tasks.data.filter(t=>!t.done&&t.due_date&&t.due_date<today()).length;
  return <>
    <style>{gcss}</style>
    <div style={{minHeight:'100vh',background:C.bg,paddingBottom:72}}>
      <div style={{padding:'14px 16px 12px',borderBottom:`1px solid ${C.border}`,background:C.card,position:'sticky',top:0,zIndex:50,display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1}}><span style={{fontFamily:'Syne',fontWeight:800,fontSize:20,color:C.accent}}>Клиника</span><span style={{color:C.muted,fontSize:11,marginLeft:8}}>· {TABS.find(t=>t.id===tab)?.label}</span></div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {overdueCnt>0&&<div style={{background:C.red+'22',border:`1px solid ${C.red}44`,borderRadius:20,padding:'2px 8px',fontSize:11,color:C.red}}>⚠{overdueCnt}</div>}
          <div style={{background:C.accent+'22',border:`1px solid ${C.accent}33`,borderRadius:20,padding:'2px 10px',fontSize:11,color:C.accent}}>{todayCnt} сегодня</div>
          <button onClick={()=>setMenuOpen(true)} style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:10,width:34,height:34,fontSize:18,color:C.muted}}>☰</button>
        </div>
      </div>
      <div style={{padding:16}}>
        {tab==='dashboard'&&<DashboardTab patients={patients} appts={appts} payments={payments} doctors={doctors} tasks={tasks}/>}
        {tab==='reception'&&<ReceptionTab appts={appts} patients={patients} doctors={doctors}/>}
        {tab==='patients'&&<PatientsTab patients={patients} appts={appts} emr={emr}/>}
        {tab==='doctors'&&<DoctorsTab doctors={doctors}/>}
        {tab==='finances'&&<FinancesTab payments={payments} patients={patients} doctors={doctors}/>}
        {tab==='tasks'&&<TasksTab tasks={tasks} doctors={doctors}/>}
      </div>
    </div>
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:C.card,borderTop:`1px solid ${C.border}`,display:'flex',padding:'6px 0 8px',zIndex:50}}>
      {TABS.slice(0,5).map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:'transparent',display:'flex',flexDirection:'column',alignItems:'center',gap:1,padding:'3px 2px',borderTop:tab===t.id?`2px solid ${C.accent}`:'2px solid transparent'}}><span style={{fontSize:17}}>{t.icon}</span><span style={{fontSize:9,color:tab===t.id?C.accent:C.muted,fontWeight:tab===t.id?600:400}}>{t.label}</span></button>)}
      <button onClick={()=>setMenuOpen(true)} style={{flex:1,background:'transparent',display:'flex',flexDirection:'column',alignItems:'center',gap:1,padding:'3px 2px',borderTop:'2px solid transparent'}}><span style={{fontSize:17}}>⋯</span><span style={{fontSize:9,color:C.muted}}>Ещё</span></button>
    </div>
    {menuOpen&&<div style={{position:'fixed',inset:0,background:'#000c',zIndex:300,display:'flex',alignItems:'flex-end'}} onClick={()=>setMenuOpen(false)}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.card2,borderRadius:'22px 22px 0 0',padding:24,width:'100%',maxWidth:520,margin:'0 auto',border:`1px solid ${C.border}`,borderBottom:'none',animation:'slideUp .22s ease'}}>
        <div style={{fontFamily:'Syne',fontWeight:700,fontSize:16,marginBottom:16}}>Все разделы</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          {TABS.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setMenuOpen(false);}} style={{background:tab===t.id?C.accent+'22':C.bg,border:`1.5px solid ${tab===t.id?C.accent:C.border}`,borderRadius:14,padding:'12px 8px',display:'flex',flexDirection:'column',alignItems:'center',gap:4}}><span style={{fontSize:22}}>{t.icon}</span><span style={{fontSize:11,color:tab===t.id?C.accent:C.text,fontWeight:600,textAlign:'center'}}>{t.label}</span></button>)}
        </div>
      </div>
    </div>}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
