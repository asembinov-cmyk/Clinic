// ROOT APP
// ══════════════════════════════════════════════════════════════════════════════
const TABS=[
  {id:'dashboard',icon:'📊',label:'Главная'},
  {id:'reception',icon:'🏥',label:'Ресепшн'},
  {id:'schedule', icon:'📅',label:'Расписание'},
  {id:'patients', icon:'👤',label:'Пациенты'},
  {id:'visits',   icon:'📋',label:'Визиты'},
  {id:'doctors',  icon:'👨‍⚕️',label:'Врачи'},
  {id:'finances', icon:'💰',label:'Финансы'},
  {id:'tasks',    icon:'✅',label:'Задачи'},
  {id:'specialties',icon:'🩺',label:'Справочник'},
  {id:'users',    icon:'🔐',label:'Доступы'},
];

const ROLE_TABS={
  admin:   ['dashboard','reception','schedule','patients','visits','doctors','finances','tasks','specialties','users'],
  reception:['reception','schedule','patients','visits','finances'],
  doctor:  ['schedule','patients','visits'],
  accountant:['finances','dashboard'],
};

function App({user,onLogout}){
  const allowedTabs=ROLE_TABS[user?.role]||['reception'];
  const[tab,setTab]=useState(allowedTabs[0]);
  const[sideOpen,setSideOpen]=useState(false);
  const doctors=useTable('clinic_doctors','created_at',true);
  const patients=useTable('clinic_patients','created_at',false);
  const appts=useTable('clinic_appointments','created_at',false);
  const payments=useTable('clinic_payments','created_at',false);
  const emr=useTable('clinic_emr','created_at',false);
  const tasks=useTable('clinic_tasks','created_at',false);
  const[specialties,setSpecialties]=useState([]);
  useEffect(()=>{
    (async()=>{
      try{
        const{data}=await db.from('clinic_settings').select('value').eq('key','specialties').single();
        if(data?.value)setSpecialties(JSON.parse(data.value));
      }catch{}
    })();
  },[]);
  const todayCnt=appts.data.filter(a=>a.date===today()).length;
  const overdueCnt=tasks.data.filter(t=>!t.done&&t.due_date&&t.due_date<today()).length;

  const SidebarContent=()=><>
    {/* Logo */}
    <div style={{padding:'22px 20px 16px',borderBottom:'1px solid rgba(255,255,255,.1)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div>
          <div style={{color:'#fff',fontWeight:800,fontSize:20,letterSpacing:2,fontFamily:'DM Sans,Arial,sans-serif'}}>LUCEM</div>
          <div style={{color:'rgba(255,255,255,.5)',fontSize:10,letterSpacing:1.5,marginTop:1}}>MEDICAL CLINIC</div>
        </div>
        <button className="mobile-only" onClick={()=>setSideOpen(false)} style={{background:'rgba(255,255,255,.1)',border:'none',color:'rgba(255,255,255,.7)',borderRadius:8,width:28,height:28,fontSize:16,cursor:'pointer',lineHeight:1}}>×</button>
      </div>
      <div style={{background:'rgba(255,255,255,.1)',borderRadius:10,padding:'10px 12px'}}>
        <div style={{color:'#fff',fontWeight:600,fontSize:13}}>{user?.name}</div>
        <div style={{color:'rgba(255,255,255,.5)',fontSize:11,marginTop:2}}>{({admin:'Администратор',reception:'Ресепшн',doctor:'Врач',accountant:'Бухгалтер'})[user?.role]||user?.role}</div>
      </div>
    </div>
    {/* Nav */}
    <div style={{flex:1,overflowY:'auto',padding:'10px 10px'}}>
      {TABS.filter(t=>allowedTabs.includes(t.id)).map(t=><button key={t.id} onClick={()=>{setTab(t.id);setSideOpen(false);}} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderRadius:10,background:tab===t.id?'rgba(255,255,255,.18)':'transparent',border:'none',cursor:'pointer',marginBottom:2,textAlign:'left',transition:'background .15s'}}>
        <span style={{fontSize:18,width:24,textAlign:'center'}}>{t.icon}</span>
        <span style={{fontSize:14,fontWeight:tab===t.id?600:400,color:tab===t.id?'#fff':'rgba(255,255,255,.6)'}}>{t.label}</span>
        {tab===t.id&&<div style={{marginLeft:'auto',width:5,height:5,borderRadius:'50%',background:'#fff'}}/>}
      </button>)}
    </div>
    {/* Badges + Logout */}
    <div style={{padding:'12px 16px',borderTop:'1px solid rgba(255,255,255,.1)'}}>
      <div style={{display:'flex',gap:8,marginBottom:10}}>
        {overdueCnt>0&&<div style={{background:'rgba(239,68,68,.25)',borderRadius:20,padding:'3px 10px',fontSize:11,color:'#fca5a5',fontWeight:600}}>⚠ {overdueCnt}</div>}
        <div style={{background:'rgba(255,255,255,.12)',borderRadius:20,padding:'3px 10px',fontSize:11,color:'rgba(255,255,255,.8)',fontWeight:600}}>{todayCnt} сегодня</div>
      </div>
      <button onClick={onLogout} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:10,background:'rgba(255,255,255,.08)',border:'none',cursor:'pointer',color:'rgba(255,255,255,.6)'}}>
        <span style={{fontSize:16}}>🚪</span><span style={{fontSize:13,fontWeight:500}}>Выйти</span>
      </button>
    </div>
  </>;

  const tabContent=<>
    {tab==='dashboard'&&<DashboardTab patients={patients} appts={appts} payments={payments} doctors={doctors} tasks={tasks}/>}
    {tab==='reception'&&<ReceptionTab appts={appts} patients={patients} doctors={doctors}/>}
    {tab==='schedule'&&<ScheduleTab appts={appts} patients={patients} doctors={doctors}/>}
    {tab==='patients'&&<PatientsTab patients={patients} appts={appts} emr={emr}/>}
    {tab==='visits'&&<VisitsTab user={user} patients={patients} doctors={doctors} appts={appts}/>}
    {tab==='doctors'&&<DoctorsTab doctors={doctors} specialties={specialties}/>}
    {tab==='specialties'&&<SpecialtiesTab specialties={specialties} setSpecialties={setSpecialties} doctors={doctors}/>}
    {tab==='users'&&user?.role==='admin'&&<UsersTab doctors={doctors}/>}
    {tab==='finances'&&<FinancesTab payments={payments} patients={patients} doctors={doctors}/>}
    {tab==='tasks'&&<TasksTab tasks={tasks} doctors={doctors}/>}
  </>;

  return <>
    <style>{gcss+`
      .desktop-sidebar{display:flex;}
      .mobile-header{display:none;}
      .mobile-only{display:none;}
      @media(max-width:768px){
        .desktop-sidebar{display:none!important;}
        .mobile-header{display:flex!important;}
        .mobile-only{display:block!important;}
        .desktop-layout{flex-direction:column!important;}
        .content-area{padding:12px!important;max-width:100%!important;}
      }
    `}</style>

    {/* ── DESKTOP LAYOUT ── */}
    <div className="desktop-layout" style={{display:'flex',minHeight:'100vh',background:C.bg}}>

      {/* Постоянный сайдбар (десктоп) */}
      <div className="desktop-sidebar" style={{width:240,minWidth:240,background:'#4a1b6d',flexDirection:'column',position:'sticky',top:0,height:'100vh',overflowY:'auto',flexShrink:0}}>
        <SidebarContent/>
      </div>

      {/* Основной контент */}
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,overflow:'hidden'}}>

        {/* Мобильный хедер */}
        <div className="mobile-header" style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,background:'#4a1b6d',position:'sticky',top:0,zIndex:50,alignItems:'center',gap:10,display:'none'}}>
          <button onClick={()=>setSideOpen(true)} style={{background:'rgba(255,255,255,.15)',border:'none',borderRadius:10,width:36,height:36,fontSize:18,color:'#fff',cursor:'pointer',flexShrink:0}}>☰</button>
          <span style={{fontWeight:800,fontSize:18,color:'#fff',letterSpacing:1}}>LUCEM</span>
          <span style={{color:'rgba(255,255,255,.5)',fontSize:10,marginLeft:4}}>MEDICAL CLINIC</span>
          <span style={{color:'rgba(255,255,255,.4)',fontSize:11,marginLeft:6}}>· {TABS.find(t=>t.id===tab)?.label}</span>
        </div>

        {/* Десктопный топбар */}
        <div style={{padding:'14px 28px 12px',borderBottom:`1px solid ${C.border}`,background:C.card,display:'flex',alignItems:'center',justifyContent:'space-between',gap:16,flexShrink:0}}>
          <div>
            <span style={{fontWeight:700,fontSize:20,color:'#4a1b6d'}}>{TABS.find(t=>t.id===tab)?.icon} {TABS.find(t=>t.id===tab)?.label}</span>
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            {overdueCnt>0&&<div style={{background:C.red+'18',border:`1px solid ${C.red}33`,borderRadius:20,padding:'4px 12px',fontSize:12,color:C.red,fontWeight:600}}>⚠ {overdueCnt} просрочено</div>}
            <div style={{background:'#4a1b6d18',border:'1px solid #4a1b6d33',borderRadius:20,padding:'4px 14px',fontSize:12,color:'#4a1b6d',fontWeight:600}}>📅 {todayCnt} сегодня</div>
            <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:'6px 14px',fontSize:12,color:C.muted}}>👤 {user?.name}</div>
          </div>
        </div>

        {/* Контент */}
        <div className="content-area" style={{flex:1,padding:'24px 28px',maxWidth:1200,width:'100%',margin:'0 auto',boxSizing:'border-box'}}>
          {tabContent}
        </div>
      </div>
    </div>

    {/* Мобильный sliding sidebar */}
    <div style={{position:'fixed',top:0,left:sideOpen?0:-260,width:260,height:'100vh',background:'#4a1b6d',zIndex:200,boxShadow:'4px 0 24px rgba(74,27,109,.4)',transition:'left .25s ease',display:'flex',flexDirection:'column'}}>
      <SidebarContent/>
    </div>
    {sideOpen&&<div onClick={()=>setSideOpen(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:199}}/>}
  </>;
}

// USERS TAB (только для админа)
// ══════════════════════════════════════════════════════════════════════════════
function UsersTab({doctors}){
  const[users,setUsers]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showAdd,setShowAdd]=useState(false);
  const[sel,setSel]=useState(null);
  const[saving,setSaving]=useState(false);
  const ef={login:'',password_hash:'',name:'',role:'reception',doctor_id:'',active:true};
  const[form,setForm]=useState(ef);

  const ROLES=[
    {id:'admin',label:'Администратор',desc:'Полный доступ ко всему',icon:'👑'},
    {id:'reception',label:'Ресепшн',desc:'Расписание, пациенты, платежи',icon:'🏥'},
    {id:'doctor',label:'Врач',desc:'Своё расписание и ЭМК',icon:'👨‍⚕️'},
    {id:'accountant',label:'Бухгалтер',desc:'Только финансы',icon:'💰'},
  ];

  useEffect(()=>{load();},[]);
  const load=async()=>{setLoading(true);const{data}=await db.from('clinic_users').select('*').order('created_at',{ascending:true});setUsers(data||[]);setLoading(false);};

  const save=async()=>{
    if(!form.login.trim()||!form.password_hash.trim()||!form.name.trim())return;
    setSaving(true);
    if(sel){await db.from('clinic_users').update({...form,doctor_id:form.doctor_id||null}).eq('id',sel.id);}
    else{await db.from('clinic_users').insert({...form,doctor_id:form.doctor_id||null});}
    await load();setShowAdd(false);setSel(null);setForm(ef);setSaving(false);
  };

  const toggleActive=async(u)=>{await db.from('clinic_users').update({active:!u.active}).eq('id',u.id);await load();};
  const delUser=async(id)=>{await db.from('clinic_users').delete().eq('id',id);await load();setSel(null);};

  const roleInfo=r=>ROLES.find(x=>x.id===r)||{label:r,icon:'👤'};

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <span style={{fontWeight:700,fontSize:16,color:C.text}}>Пользователи ({users.length})</span>
      <Btn small onClick={()=>{setForm(ef);setShowAdd(true);}}>+ Добавить</Btn>
    </div>

    {loading?<Spinner/>:<div style={{display:'flex',flexDirection:'column',gap:10}}>
      {users.map(u=><Card key={u.id} style={{padding:'14px 16px',borderLeft:`4px solid ${u.active?C.accent:C.muted}`}}>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <div style={{width:40,height:40,borderRadius:'50%',background:C.accent+'18',border:`2px solid ${C.accent}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{roleInfo(u.role).icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,color:C.text}}>{u.name}</div>
            <div style={{color:C.muted,fontSize:12,marginTop:2}}>@{u.login} · {roleInfo(u.role).label}</div>
          </div>
          <div style={{display:'flex',gap:6}}>
            <div onClick={()=>toggleActive(u)} style={{background:u.active?C.green+'18':C.muted+'18',border:`1px solid ${u.active?C.green:C.muted}44`,borderRadius:20,padding:'3px 10px',fontSize:11,color:u.active?C.green:C.muted,fontWeight:600,cursor:'pointer'}}>{u.active?'Активен':'Откл.'}</div>
            <button onClick={()=>{setSel(u);setForm({login:u.login,password_hash:u.password_hash,name:u.name,role:u.role,doctor_id:u.doctor_id||'',active:u.active});setShowAdd(true);}} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:'4px 10px',fontSize:12,color:C.muted}}>✏️</button>
          </div>
        </div>
      </Card>)}
    </div>}

    {showAdd&&<Modal title={sel?'Редактировать':'Новый пользователь'} onClose={()=>{setShowAdd(false);setSel(null);setForm(ef);}}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <input placeholder="Имя *" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
        <input placeholder="Логин *" value={form.login} onChange={e=>setForm({...form,login:e.target.value})} autoComplete="off"/>
        <input placeholder="Пароль *" type="password" value={form.password_hash} onChange={e=>setForm({...form,password_hash:e.target.value})} autoComplete="new-password"/>

        <div style={{fontWeight:600,fontSize:13,color:C.muted,marginTop:4}}>РОЛЬ</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {ROLES.map(r=><div key={r.id} onClick={()=>setForm({...form,role:r.id})} style={{display:'flex',gap:12,alignItems:'center',padding:'10px 14px',borderRadius:12,border:`1.5px solid ${form.role===r.id?C.accent:C.border}`,background:form.role===r.id?C.accent+'08':C.bg,cursor:'pointer'}}>
            <span style={{fontSize:20}}>{r.icon}</span>
            <div style={{flex:1}}><div style={{fontWeight:600,color:C.text,fontSize:14}}>{r.label}</div><div style={{color:C.muted,fontSize:12}}>{r.desc}</div></div>
            {form.role===r.id&&<span style={{color:C.accent,fontSize:18}}>✓</span>}
          </div>)}
        </div>

        {form.role==='doctor'&&<div>
          <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Привязать к врачу</div>
          <select value={form.doctor_id} onChange={e=>setForm({...form,doctor_id:e.target.value})}>
            <option value="">— Выбрать врача —</option>
            {doctors.data.map(d=><option key={d.id} value={d.id}>{d.name}{d.specialty?` (${d.specialty})`:''}</option>)}
          </select>
        </div>}

        <div style={{display:'flex',gap:10}}>
          <Btn full onClick={save} disabled={saving}>{saving?'Сохранение...':(sel?'Сохранить':'Добавить')}</Btn>
          {sel&&<Btn outline color={C.red} onClick={()=>delUser(sel.id)}>Удалить</Btn>}
        </div>
      </div>
    </Modal>}
  </div>;
}

// ══════════════════════════════════════════════════════════════════════════════
// LOGIN SCREEN
// ══════════════════════════════════════════════════════════════════════════════
function LoginScreen({onLogin}){
  const[login,setLogin]=useState('');
  const[password,setPassword]=useState('');
  const[error,setError]=useState('');
  const[loading,setLoading]=useState(false);

  const doLogin=async()=>{
    if(!login.trim()||!password.trim()){setError('Введите логин и пароль');return;}
    setLoading(true);setError('');
    try{
      const{data:users}=await db.from('clinic_users').select('*').eq('login',login.trim()).eq('active',true);
      const user=users?.[0];
      if(!user){setError('Пользователь не найден');setLoading(false);return;}
      if(user.password_hash!==password){setError('Неверный пароль');setLoading(false);return;}
      localStorage.setItem('clinic_auth',JSON.stringify({id:user.id,name:user.name,role:user.role,doctor_id:user.doctor_id,login:user.login}));
      onLogin(user);
    }catch{setError('Ошибка подключения');}
    setLoading(false);
  };

  const handleKey=e=>{if(e.key==='Enter')doLogin();};

  return <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#4a1b6d,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
    <div style={{width:'100%',maxWidth:400}}>
      <div style={{textAlign:'center',marginBottom:32}}>
        <div style={{marginBottom:16}}>
          <div style={{color:'#fff',fontWeight:800,fontSize:32,letterSpacing:3,fontFamily:'DM Sans,Arial,sans-serif'}}>LUCEM</div>
          <div style={{color:'rgba(255,255,255,.6)',fontSize:13,letterSpacing:2,marginTop:4}}>MEDICAL CLINIC</div>
        </div>
        <div style={{color:'rgba(255,255,255,.5)',fontSize:13}}>Система управления клиникой</div>
      </div>
      <Card style={{padding:28}}>
        <div style={{fontWeight:700,fontSize:18,marginBottom:4,color:C.text}}>Вход</div>
        <div style={{color:C.muted,fontSize:13,marginBottom:20}}>Введите логин и пароль</div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div><div style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:500}}>Логин</div><input placeholder="admin" value={login} onChange={e=>setLogin(e.target.value)} onKeyDown={handleKey} autoComplete="username"/></div>
          <div><div style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:500}}>Пароль</div><input type="password" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={handleKey} autoComplete="current-password"/></div>
          {error&&<div style={{background:C.red+'12',border:`1px solid ${C.red}33`,borderRadius:12,padding:'10px 14px',color:C.red,fontSize:13}}>{error}</div>}
          <Btn onClick={doLogin} full disabled={loading}>{loading?'Проверяем...':'Войти'}</Btn>
        </div>
      </Card>
    </div>
  </div>;
}

// ROOT APP (с авторизацией)
// ══════════════════════════════════════════════════════════════════════════════
function AppWithAuth(){
  const[user,setUser]=useState(null);
  const[checking,setChecking]=useState(true);

  useEffect(()=>{
    try{const s=localStorage.getItem('clinic_auth');if(s)setUser(JSON.parse(s));}catch{}
    setChecking(false);
  },[]);

  if(checking) return <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#2563eb,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{width:36,height:36,border:'3px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .8s linear infinite'}}/></div>;

  if(!user) return <LoginScreen onLogin={u=>setUser(u)}/>;

  return <App user={user} onLogout={()=>{localStorage.removeItem('clinic_auth');setUser(null);}}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppWithAuth/>);
</script>
