}

// ── Supabase hook ─────────────────────────────────────────────────────────────
function useTable(table,orderCol='created_at',orderAsc=false){
  const[data,setData]=useState([]);const[loading,setLoading]=useState(true);
  const load=useCallback(async()=>{setLoading(true);const{data:rows}=await db.from(table).select('*').order(orderCol,{ascending:orderAsc});setData(rows||[]);setLoading(false);},[table]);
  useEffect(()=>{load();},[load]);
  const insert=async row=>{const{data:ins}=await db.from(table).insert(row).select().single();setData(p=>[ins,...p]);return ins;};
  const update=async(id,ch)=>{await db.from(table).update(ch).eq('id',id);setData(p=>p.map(r=>r.id===id?{...r,...ch}:r));};
  const remove=async id=>{await db.from(table).delete().eq('id',id);setData(p=>p.filter(r=>r.id!==id));};
  return{data,loading,load,insert,update,remove};
}

// RECEPTION
// ══════════════════════════════════════════════════════════════════════════════
function ReceptionTab({appts,patients,doctors}){
  const[selDate,setSelDate]=useState(today());const[showAdd,setShowAdd]=useState(false);const[selApp,setSelApp]=useState(null);const[saving,setSaving]=useState(false);
  const[form,setForm]=useState({patient_name:'',doctor_id:'',time:'09:00',service:'',status:'Запланирован',date:today()});
  const nav=d=>{const dt=new Date(selDate);dt.setDate(dt.getDate()+d);setSelDate(dt.toISOString().split('T')[0]);};
  const dayApps=[...appts.data.filter(a=>a.date===selDate)].sort((a,b)=>a.time.localeCompare(b.time));
  const stats={total:dayApps.length,came:dayApps.filter(a=>a.status==='Пришёл'||a.status==='Завершён').length,waiting:dayApps.filter(a=>a.status==='Запланирован').length,cancelled:dayApps.filter(a=>a.status==='Отменён').length};
  const addApp=async()=>{
    if(!form.patient_name.trim())return;
    setSaving(true);
    const doc=doctors.data.find(d=>String(d.id)===String(form.doctor_id));
    // Ищем пациента в базе
    let pt=patients.data.find(p=>p.name.toLowerCase()===form.patient_name.trim().toLowerCase());
    // Если не найден — создаём
    if(!pt){
      pt=await patients.insert({name:form.patient_name.trim(),phone:'',dob:'',gender:'',address:'',allergy:'',notes:''});
    }
    await appts.insert({...form,patient_name:form.patient_name.trim(),doctor_id:doc?.id||null,doctor_name:doc?.name||'',patient_id:pt?.id||null});
    setShowAdd(false);setSaving(false);
  };
  const updStatus=async(id,status)=>{await appts.update(id,{status});if(selApp?.id===id)setSelApp({...selApp,status});};

  return <div>
    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14}}>
      <button onClick={()=>nav(-1)} style={{background:C.card,border:`1px solid ${C.border}`,color:C.text,borderRadius:10,width:38,height:38,fontSize:18,boxShadow:'0 1px 3px rgba(0,0,0,.08)'}}>‹</button>
      <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{flex:1,textAlign:'center'}}/>
      <button onClick={()=>nav(1)} style={{background:C.card,border:`1px solid ${C.border}`,color:C.text,borderRadius:10,width:38,height:38,fontSize:18,boxShadow:'0 1px 3px rgba(0,0,0,.08)'}}>›</button>
      <button onClick={()=>{setForm({patient_name:'',doctor_id:'',time:'09:00',service:'',status:'Запланирован',date:selDate});setShowAdd(true);}} style={{background:C.accent,color:'#fff',borderRadius:10,width:38,height:38,fontSize:20,fontWeight:700,flexShrink:0,boxShadow:`0 2px 8px ${C.accent}55`}}>+</button>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:14}}>
      {[{l:'Всего',v:stats.total,c:C.accent},{l:'Пришли',v:stats.came,c:C.green},{l:'Ждут',v:stats.waiting,c:C.orange},{l:'Отмена',v:stats.cancelled,c:C.red}].map(({l,v,c})=>(
        <Card key={l} style={{flex:1,padding:'8px 6px',textAlign:'center',borderTop:`3px solid ${c}`}}>
          <div style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:800,fontSize:18,color:c}}>{v}</div>
          <div style={{color:C.muted,fontSize:10}}>{l}</div>
        </Card>
      ))}
    </div>
    {appts.loading?<Spinner/>:dayApps.length===0?<div style={{textAlign:'center',color:C.muted,padding:40}}>Записей нет</div>:(
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {dayApps.map(a=>{const doc=doctors.data.find(d=>d.id===a.doctor_id);return <Card key={a.id} style={{padding:'12px 14px',borderLeft:`4px solid ${STATUS_C[a.status]||C.muted}`}}>
          <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
            {doc&&<DoctorAvatar doctor={doc} size={36}/>}
            <div style={{flex:1}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:700,color:C.text}}>{a.time} {a.patient_name}</span><Badge text={a.status} color={STATUS_C[a.status]||C.muted}/></div>
              <div style={{color:C.muted,fontSize:12,marginTop:3}}>{a.doctor_name||'—'}{a.service?` · ${a.service}`:''}</div>
            </div>
          </div>
          <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
            {a.status==='Запланирован'&&<Btn small color={C.green} onClick={()=>updStatus(a.id,'Пришёл')}>✓ Пришёл</Btn>}
            {a.status==='Пришёл'&&<Btn small color={C.purple} onClick={()=>updStatus(a.id,'Завершён')}>✓ Завершён</Btn>}
            {a.status==='Запланирован'&&<Btn small color={C.red} outline onClick={()=>updStatus(a.id,'Отменён')}>Отменить</Btn>}
            <Btn small outline color={C.accent} onClick={()=>setSelApp(a)}>Детали</Btn>
          </div>
        </Card>;})}
      </div>
    )}
    {showAdd&&<Modal title="Быстрая запись" onClose={()=>setShowAdd(false)}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <input placeholder="Пациент *" value={form.patient_name} onChange={e=>setForm({...form,patient_name:e.target.value})} list="rpl"/>
        <datalist id="rpl">{patients.data.map(p=><option key={p.id} value={p.name}/>)}</datalist>
        <select value={form.doctor_id} onChange={e=>setForm({...form,doctor_id:e.target.value})}><option value="">— Врач —</option>{doctors.data.map(d=><option key={d.id} value={d.id}>{d.name}{d.specialty?` (${d.specialty})`:''}</option>)}</select>
        <div style={{display:'flex',gap:10}}><input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/><select value={form.time} onChange={e=>setForm({...form,time:e.target.value})}>{genSlots('06:00','22:30').map(t=><option key={t}>{t}</option>)}</select></div>
        <input placeholder="Услуга" value={form.service} onChange={e=>setForm({...form,service:e.target.value})}/>
        <Btn onClick={addApp} full disabled={saving}>{saving?'Сохранение...':'Записать'}</Btn>
      </div>
    </Modal>}
    {selApp&&<Modal title="Приём" onClose={()=>setSelApp(null)}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <Card style={{padding:14}}><Row label="Пациент" value={selApp.patient_name}/><Row label="Врач" value={selApp.doctor_name||'—'}/><Row label="Услуга" value={selApp.service||'—'}/><Row label="Время" value={`${selApp.date} ${selApp.time}`}/><Row label="Статус" value={<Badge text={selApp.status} color={STATUS_C[selApp.status]||C.muted}/>}/></Card>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{Object.keys(STATUS_C).map(s=><Btn key={s} small onClick={()=>updStatus(selApp.id,s)} color={STATUS_C[s]} outline={selApp.status!==s}>{s}</Btn>)}</div>
        <Btn onClick={async()=>{await appts.remove(selApp.id);setSelApp(null);}} color={C.red} outline full>Удалить</Btn>
      </div>
    </Modal>}
  </div>;
}

// ══════════════════════════════════════════════════════════════════════════════
function ScheduleTab({appts,patients,doctors}){
  const[selDate,setSelDate]=useState(today());const[activeDocs,setActiveDocs]=useState([]);const[showAdd,setShowAdd]=useState(false);const[selApp,setSelApp]=useState(null);const[saving,setSaving]=useState(false);
  const[form,setForm]=useState({patient_name:'',doctor_id:'',date:today(),time:'09:00',service:'',status:'Запланирован'});
  const[specFilters,setSpecFilters]=useState([]);
  const[mainDrop,setMainDrop]=useState(false); // единый дропдаун
  const[unifiedSearch,setUnifiedSearch]=useState(''); // поиск и по врачам и по специализациям

  const tSlots=genSlots('08:00','20:00');
  const SLOT_H=54;
  const dayLabel=()=>new Date(selDate+'T12:00').toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
  const nav=d=>{const dt=new Date(selDate);dt.setDate(dt.getDate()+d);setSelDate(dt.toISOString().split('T')[0]);};

  const allSpecs=React.useMemo(()=>[...new Set(doctors.data.map(d=>d.specialty).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ru')),[doctors.data]);
  const toggleSpec=s=>setSpecFilters(prev=>prev.includes(s)?prev.filter(x=>x!==s):[...prev,s]);
  const toggleDoc=id=>setActiveDocs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const clearAll=()=>{setSpecFilters([]);setActiveDocs([]);setUnifiedSearch('');};

  // Закрыть дропдаун при клике вне
  useEffect(()=>{
    if(!mainDrop)return;
    const h=e=>{if(!e.target.closest('[data-maindrop]'))setMainDrop(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[mainDrop]);

  // Фильтрованные специализации и врачи по поиску внутри дропдауна
  const q=unifiedSearch.toLowerCase();
  const matchSpecs=allSpecs.filter(s=>s.toLowerCase().includes(q));
  const matchDocs=doctors.data.filter(d=>d.name.toLowerCase().includes(q)||(d.specialty||'').toLowerCase().includes(q));

  // Итоговые видимые врачи
  const visDocs=React.useMemo(()=>doctors.data.filter(d=>{
    if(specFilters.length>0&&!specFilters.includes(d.specialty))return false;
    if(activeDocs.length>0&&!activeDocs.includes(d.id))return false;
    return true;
  }),[doctors.data,specFilters,activeDocs]);
  const finalDocs=(specFilters.length===0&&activeDocs.length===0)?doctors.data:visDocs;

  const hasFilters=specFilters.length>0||activeDocs.length>0;
  const totalSelected=specFilters.length+activeDocs.length;

  const dayApps=appts.data.filter(a=>a.date===selDate);
  const appsFor=(did,t)=>dayApps.filter(a=>a.doctor_id===did&&a.time===t);
  const addApp=async()=>{
    if(!form.patient_name.trim())return;
    setSaving(true);
    const doc=doctors.data.find(d=>String(d.id)===String(form.doctor_id));
    // Ищем пациента в базе
    let pt=patients.data.find(p=>p.name.toLowerCase()===form.patient_name.trim().toLowerCase());
    // Если не найден — создаём
    if(!pt){
      pt=await patients.insert({name:form.patient_name.trim(),phone:'',dob:'',gender:'',address:'',allergy:'',notes:''});
    }
    await appts.insert({...form,patient_name:form.patient_name.trim(),doctor_id:doc?.id||null,doctor_name:doc?.name||'',patient_id:pt?.id||null});
    setShowAdd(false);setSaving(false);
  };
  const updStatus=async(id,status)=>{await appts.update(id,{status});if(selApp?.id===id)setSelApp({...selApp,status});};

  return <div>
    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:10}}>
      <button onClick={()=>nav(-1)} style={{background:C.card,border:`1px solid ${C.border}`,color:C.text,borderRadius:10,width:38,height:38,fontSize:18,boxShadow:'0 1px 3px rgba(0,0,0,.08)'}}>‹</button>
      <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{flex:1,textAlign:'center'}}/>
      <button onClick={()=>nav(1)} style={{background:C.card,border:`1px solid ${C.border}`,color:C.text,borderRadius:10,width:38,height:38,fontSize:18,boxShadow:'0 1px 3px rgba(0,0,0,.08)'}}>›</button>
      <button onClick={()=>{setForm({patient_name:'',doctor_id:'',date:selDate,time:'09:00',service:'',status:'Запланирован'});setShowAdd(true);}} style={{background:C.accent,color:'#fff',borderRadius:10,width:38,height:38,fontSize:20,fontWeight:700,flexShrink:0,boxShadow:`0 2px 8px ${C.accent}55`}}>+</button>
    </div>
    <div style={{fontSize:12,color:C.muted,marginBottom:10,textTransform:'capitalize'}}>{dayLabel()}</div>

    {/* Единый умный поисковик */}
    {doctors.data.length>0&&<div style={{marginBottom:12}}>
      <div style={{position:'relative'}} data-maindrop>
        {/* Поле поиска */}
        <div data-maindrop style={{display:'flex',alignItems:'center',gap:8,background:C.card,border:`1.5px solid ${mainDrop||hasFilters?C.accent:C.border}`,borderRadius:12,padding:'6px 12px',cursor:'text',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}} onClick={()=>setMainDrop(true)}>
          <span style={{fontSize:15,flexShrink:0}}>🔍</span>
          <input data-maindrop placeholder="Поиск по врачу или специализации..." value={unifiedSearch} onChange={e=>setUnifiedSearch(e.target.value)} onFocus={()=>setMainDrop(true)} style={{flex:1,border:'none',background:'transparent',fontSize:13,padding:0,outline:'none',color:C.text,boxShadow:'none'}}/>
          {hasFilters&&<div style={{background:C.accent,color:'#fff',borderRadius:20,padding:'2px 8px',fontSize:11,fontWeight:700,flexShrink:0,cursor:'pointer'}} onClick={e=>{e.stopPropagation();clearAll();}}>{totalSelected} ×</div>}
          <span style={{color:C.muted,fontSize:12,flexShrink:0}}>{mainDrop?'▲':'▼'}</span>
        </div>

        {/* Дропдаун */}
        {mainDrop&&<div data-maindrop style={{position:'absolute',left:0,right:0,top:48,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:14,boxShadow:'0 8px 32px rgba(0,0,0,.15)',zIndex:100,maxHeight:420,overflowY:'auto',padding:8}}>

          {/* Секция: Врачи */}
          <div style={{padding:'4px 8px 6px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:.5,textTransform:'uppercase'}}>Врачи</span>
            {activeDocs.length>0&&<button onClick={()=>setActiveDocs([])} style={{background:'none',border:'none',color:C.accent,fontSize:11,cursor:'pointer',fontWeight:600}}>Сбросить</button>}
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',padding:'0 4px 8px',borderBottom:`1px solid ${C.border}`,marginBottom:8}}>
            {matchDocs.map(d=>{
              const on=activeDocs.includes(d.id);
              return <div key={d.id} data-maindrop onClick={()=>toggleDoc(d.id)} style={{display:'flex',alignItems:'center',gap:6,background:on?d.color+'22':C.bg,border:`1.5px solid ${on?d.color:C.border}`,borderRadius:20,padding:'5px 10px',cursor:'pointer',flexShrink:0}}>
                <DoctorAvatar doctor={d} size={20}/>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:on?d.color:C.text,lineHeight:1.2}}>{d.name.split(' ')[0]} {d.name.split(' ')[1]||''}</div>
                  {d.specialty&&<div style={{fontSize:10,color:C.muted,lineHeight:1.2}}>{d.specialty.split(',')[0]}</div>}
                </div>
                {on&&<span style={{color:d.color,fontSize:14,marginLeft:2}}>✓</span>}
              </div>;
            })}
            {matchDocs.length===0&&<div style={{color:C.muted,fontSize:12,padding:'4px 8px'}}>Врачи не найдены</div>}
          </div>

          {/* Секция: Специализации */}
          <div style={{padding:'4px 8px 6px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:.5,textTransform:'uppercase'}}>Специализации</span>
            {specFilters.length>0&&<button onClick={()=>setSpecFilters([])} style={{background:'none',border:'none',color:C.accent,fontSize:11,cursor:'pointer',fontWeight:600}}>Сбросить</button>}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:2,padding:'0 0 4px'}}>
            {matchSpecs.map(s=>{
              const cnt=doctors.data.filter(d=>d.specialty===s).length;
              const on=specFilters.includes(s);
              return <div key={s} data-maindrop onClick={()=>toggleSpec(s)} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderRadius:10,cursor:'pointer',background:on?C.accent+'12':'transparent'}}>
                <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${on?C.accent:C.border}`,background:on?C.accent:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  {on&&<span style={{color:'#fff',fontSize:11,lineHeight:1}}>✓</span>}
                </div>
                <span style={{flex:1,fontSize:12,color:on?C.accent:C.text,fontWeight:on?600:400}}>{s}</span>
                <span style={{fontSize:11,color:C.muted,background:C.bg,borderRadius:10,padding:'1px 6px'}}>{cnt}</span>
              </div>;
            })}
            {matchSpecs.length===0&&<div style={{color:C.muted,fontSize:12,padding:'4px 10px'}}>Специализации не найдены</div>}
          </div>
        </div>}
      </div>

      {/* Теги активных фильтров */}
      {hasFilters&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:8,alignItems:'center'}}>
        {activeDocs.map(id=>{const d=doctors.data.find(x=>x.id===id);return d?<div key={id} style={{display:'flex',alignItems:'center',gap:4,background:d.color+'18',border:`1px solid ${d.color}44`,borderRadius:20,padding:'3px 10px',fontSize:11,color:d.color}}>
          👤 {d.name.split(' ')[0]}<span onClick={()=>toggleDoc(id)} style={{cursor:'pointer',fontWeight:700,fontSize:13,lineHeight:1,marginLeft:2}}>×</span>
        </div>:null;})}
        {specFilters.map(s=><div key={s} style={{display:'flex',alignItems:'center',gap:4,background:C.accent+'18',border:`1px solid ${C.accent}44`,borderRadius:20,padding:'3px 10px',fontSize:11,color:C.accent}}>
          🎯 {s}<span onClick={()=>toggleSpec(s)} style={{cursor:'pointer',fontWeight:700,fontSize:13,lineHeight:1,marginLeft:2}}>×</span>
        </div>)}
        <span style={{fontSize:11,color:C.muted}}>· показано врачей: {finalDocs.length}</span>
      </div>}
    </div>}

    {appts.loading?<Spinner/>:finalDocs.length===0?(
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {dayApps.length===0?<div style={{textAlign:'center',color:C.muted,padding:40}}>Записей нет</div>:
        [...dayApps].sort((a,b)=>a.time.localeCompare(b.time)).map(a=><Card key={a.id} style={{padding:'12px 14px',borderLeft:`4px solid ${STATUS_C[a.status]||C.muted}`}}>
          <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:700}}>{a.time} — {a.patient_name}</span><Badge text={a.status} color={STATUS_C[a.status]||C.muted}/></div>
          {(a.doctor_name||a.service)&&<div style={{color:C.muted,fontSize:12,marginTop:4}}>{a.doctor_name}{a.service?` · ${a.service}`:''}</div>}
          <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
            {a.status==='Запланирован'&&<Btn small color={C.green} onClick={()=>updStatus(a.id,'Пришёл')}>✓ Пришёл</Btn>}
            {a.status==='Пришёл'&&<Btn small color={C.purple} onClick={()=>updStatus(a.id,'Завершён')}>✓ Завершён</Btn>}
            <Btn small outline color={C.accent} onClick={()=>setSelApp(a)}>Детали</Btn>
          </div>
        </Card>)}
      </div>
    ):(
      <div style={{overflowX:'auto',marginLeft:-16,marginRight:-16,paddingLeft:16}}>
        <div style={{display:'flex',minWidth:finalDocs.length*160+56}}>
          <div style={{width:48,flexShrink:0,paddingTop:50}}>
            {tSlots.map(t=><div key={t} style={{height:SLOT_H,display:'flex',alignItems:'center'}}><span style={{fontSize:11,color:C.muted,fontVariantNumeric:'tabular-nums'}}>{t}</span></div>)}
          </div>
          {finalDocs.map(doc=><div key={doc.id} style={{flex:1,minWidth:150,marginRight:8}}>
            <div style={{height:50,display:'flex',alignItems:'center',gap:8,paddingBottom:6}}>
              <DoctorAvatar doctor={doc} size={28}/>
              <div><div style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:600,fontSize:12,color:doc.color}}>{doc.name.split(' ')[0]}</div>{doc.specialty&&<div style={{fontSize:10,color:C.muted}}>{doc.specialty.split(',')[0]}</div>}</div>
            </div>
            {tSlots.map(t=>{const apps=appsFor(doc.id,t);const inW=t>=(doc.work_start||'08:00')&&t<(doc.work_end||'18:00');return<div key={t} onClick={()=>apps.length===0?(()=>{setForm({patient_name:'',doctor_id:doc.id,date:selDate,time:t,service:'',status:'Запланирован'});setShowAdd(true);})():setSelApp(apps[0])} style={{height:SLOT_H,borderTop:`1px solid ${C.border}`,background:inW?C.card:C.bg,cursor:'pointer',position:'relative',overflow:'hidden',transition:'background .1s'}}>
              {apps.map(a=><div key={a.id} style={{position:'absolute',inset:'3px 3px',background:STATUS_C[a.status]+'18',border:`1.5px solid ${STATUS_C[a.status]}66`,borderRadius:8,padding:'4px 8px',overflow:'hidden'}}>
                <div style={{fontWeight:600,fontSize:12,color:STATUS_C[a.status],overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.patient_name}</div>
                {a.service&&<div style={{fontSize:10,color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.service}</div>}
              </div>)}
            </div>;})}
          </div>)}
        </div>
      </div>
    )}

    {showAdd&&<Modal title="Новая запись" onClose={()=>setShowAdd(false)}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <input placeholder="Пациент *" value={form.patient_name} onChange={e=>setForm({...form,patient_name:e.target.value})} list="spl"/>
        <datalist id="spl">{patients.data.map(p=><option key={p.id} value={p.name}/>)}</datalist>
        <select value={form.doctor_id} onChange={e=>setForm({...form,doctor_id:e.target.value})}><option value="">— Врач —</option>{doctors.data.map(d=><option key={d.id} value={d.id}>{d.name}{d.specialty?` (${d.specialty})`:''}</option>)}</select>
        <input placeholder="Услуга" value={form.service} onChange={e=>setForm({...form,service:e.target.value})}/>
        <div style={{display:'flex',gap:10}}><input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/><select value={form.time} onChange={e=>setForm({...form,time:e.target.value})}>{genSlots('06:00','22:30').map(t=><option key={t}>{t}</option>)}</select></div>
        <select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>{Object.keys(STATUS_C).map(s=><option key={s}>{s}</option>)}</select>
        <Btn onClick={addApp} full disabled={saving}>{saving?'Сохранение...':'Записать'}</Btn>
      </div>
    </Modal>}

    {selApp&&<Modal title="Приём" onClose={()=>setSelApp(null)}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {(()=>{const doc=doctors.data.find(d=>d.id===selApp.doctor_id);return doc?<div style={{display:'flex',gap:10,alignItems:'center',background:C.bg,borderRadius:12,padding:12,border:`1px solid ${C.border}`}}><DoctorAvatar doctor={doc} size={40}/><div><div style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:600}}>{doc.name}</div>{doc.specialty&&<div style={{color:doc.color,fontSize:12}}>{doc.specialty}</div>}</div></div>:null;})()}
        <Card style={{padding:14}}><Row label="Пациент" value={selApp.patient_name}/><Row label="Услуга" value={selApp.service||'—'}/><Row label="Время" value={`${selApp.date} ${selApp.time}`}/><Row label="Статус" value={<Badge text={selApp.status} color={STATUS_C[selApp.status]||C.muted}/>}/></Card>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{Object.keys(STATUS_C).map(s=><Btn key={s} small onClick={()=>updStatus(selApp.id,s)} color={STATUS_C[s]} outline={selApp.status!==s}>{s}</Btn>)}</div>
        <Btn onClick={async()=>{await appts.remove(selApp.id);setSelApp(null);}} color={C.red} outline full>Удалить</Btn>
      </div>
    </Modal>}
  </div>;
}

// ══════════════════════════════════════════════════════════════════════════════
// PATIENTS
// ══════════════════════════════════════════════════════════════════════════════
function PatientsTab({patients,appts,emr}){
  const[search,setSearch]=useState('');const[showAdd,setShowAdd]=useState(false);const[sel,setSel]=useState(null);const[ptab,setPtab]=useState('info');
  const[form,setForm]=useState({name:'',phone:'',dob:'',gender:'',address:'',allergy:'',notes:''});
  const[emrView,setEmrView]=useState('list');const[emrTmpl,setEmrTmpl]=useState(EMR_TMPL[0]);const[emrFields,setEmrFields]=useState({});const[selRec,setSelRec]=useState(null);const[saving,setSaving]=useState(false);
  const filtered=patients.data.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||(p.phone||'').includes(search));
  const patApps=sel?[...appts.data.filter(a=>a.patient_id===sel.id)].sort((a,b)=>b.date.localeCompare(a.date)):[];
  const patEmr=sel?[...emr.data.filter(r=>r.patient_id===sel.id)].sort((a,b)=>b.date.localeCompare(a.date)):[];
  const addPat=async()=>{if(!form.name.trim())return;setSaving(true);await patients.insert(form);setForm({name:'',phone:'',dob:'',gender:'',address:'',allergy:'',notes:''});setShowAdd(false);setSaving(false);};
  const saveEMR=async()=>{if(!sel)return;setSaving(true);await emr.insert({patient_id:sel.id,patient_name:sel.name,template_id:emrTmpl.id,template_label:emrTmpl.label,date:today(),doctor:'',fields:emrFields});setEmrFields({});setEmrView('list');setSaving(false);};

  return <div>
    <div style={{display:'flex',gap:10,marginBottom:16}}>
      <input placeholder="🔍 Поиск пациента..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <button onClick={()=>setShowAdd(true)} style={{background:C.accent,color:'#fff',borderRadius:12,padding:'10px 16px',fontWeight:700,fontSize:18,flexShrink:0,boxShadow:`0 2px 8px ${C.accent}55`}}>+</button>
    </div>
    {patients.loading?<Spinner/>:filtered.length===0?<div style={{textAlign:'center',color:C.muted,padding:40}}>Пациентов нет</div>:(
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {filtered.map(p=>{const cnt=appts.data.filter(a=>a.patient_id===p.id).length;return<Card key={p.id} onClick={()=>{setSel(p);setPtab('info');setEmrView('list');}} style={{padding:'14px 16px',cursor:'pointer'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:600,fontSize:16,color:C.text}}>{p.name}</div>{cnt>0&&<Badge text={`${cnt} прим.`} color={C.accent}/>}</div>
          <div style={{color:C.muted,fontSize:13,marginTop:4}}>{p.phone}{p.dob?` · ${p.dob}`:''}</div>
          {p.allergy&&<div style={{color:C.red,fontSize:11,marginTop:4}}>⚠ {p.allergy}</div>}
        </Card>;})}
      </div>
    )}
    {showAdd&&<Modal title="Новый пациент" onClose={()=>setShowAdd(false)}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <input placeholder="ФИО *" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
        <input placeholder="Телефон" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/>
        <div style={{display:'flex',gap:10}}><input type="date" value={form.dob} onChange={e=>setForm({...form,dob:e.target.value})} style={{flex:1}}/><select value={form.gender} onChange={e=>setForm({...form,gender:e.target.value})} style={{flex:1}}><option value="">Пол</option><option>Мужской</option><option>Женский</option></select></div>
        <input placeholder="Адрес" value={form.address} onChange={e=>setForm({...form,address:e.target.value})}/>
        <input placeholder="⚠ Аллергии" value={form.allergy} onChange={e=>setForm({...form,allergy:e.target.value})}/>
        <textarea placeholder="Заметки" rows={2} value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={{resize:'none'}}/>
        <Btn onClick={addPat} full disabled={saving}>{saving?'Сохранение...':'Добавить'}</Btn>
      </div>
    </Modal>}
    {sel&&<Modal title={sel.name} onClose={()=>setSel(null)}>
      <div style={{display:'flex',gap:0,marginBottom:16,background:C.bg,borderRadius:12,padding:3,border:`1px solid ${C.border}`}}>
        {[{id:'info',label:'Инфо'},{id:'emr',label:`ЭМК (${patEmr.length})`},{id:'history',label:`Приёмы (${patApps.length})`}].map(t=>(
          <div key={t.id} onClick={()=>setPtab(t.id)} style={{flex:1,textAlign:'center',padding:'8px 4px',borderRadius:10,background:ptab===t.id?C.card:'transparent',color:ptab===t.id?C.accent:C.muted,fontSize:12,fontWeight:600,cursor:'pointer',boxShadow:ptab===t.id?'0 1px 4px rgba(0,0,0,.08)':'none'}}>{t.label}</div>
        ))}
      </div>
      {ptab==='info'&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
        <Card style={{padding:14}}><Row label="Телефон" value={sel.phone||'—'}/><Row label="Дата рождения" value={sel.dob||'—'}/><Row label="Пол" value={sel.gender||'—'}/><Row label="Адрес" value={sel.address||'—'}/>{sel.allergy&&<div style={{background:C.red+'10',border:`1px solid ${C.red}33`,borderRadius:10,padding:'8px 12px',marginTop:8,color:C.red,fontSize:13}}>⚠ {sel.allergy}</div>}</Card>
        <Btn onClick={async()=>{await patients.remove(sel.id);setSel(null);}} color={C.red} outline full>Удалить пациента</Btn>
      </div>}
      {ptab==='emr'&&<div>
        {emrView==='list'&&<><div style={{display:'flex',gap:8,overflowX:'auto',marginBottom:12,paddingBottom:4}}>{EMR_TMPL.map(t=><div key={t.id} onClick={()=>{setEmrTmpl(t);setEmrFields({});setEmrView('new');}} style={{background:C.accent+'18',border:`1.5px solid ${C.accent}44`,borderRadius:20,padding:'5px 14px',cursor:'pointer',whiteSpace:'nowrap',fontSize:12,color:C.accent,fontWeight:600}}>+ {t.label}</div>)}</div>
        {patEmr.length===0?<div style={{textAlign:'center',color:C.muted,padding:20}}>Записей нет</div>:patEmr.map(r=><Card key={r.id} onClick={()=>{setSelRec(r);setEmrView('detail');}} style={{padding:'12px 14px',cursor:'pointer',marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:600}}>{r.template_label}</span><span style={{fontSize:12,color:C.muted}}>{r.date}</span></div>
          {r.fields?.diagnosis&&<div style={{color:C.accent,fontSize:12,marginTop:4}}>Диагноз: {r.fields.diagnosis}</div>}
        </Card>)}</>}
        {emrView==='new'&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}}>{EMR_TMPL.map(t=><div key={t.id} onClick={()=>{setEmrTmpl(t);setEmrFields({});}} style={{background:emrTmpl.id===t.id?C.accent+'18':C.bg,border:`1.5px solid ${emrTmpl.id===t.id?C.accent:C.border}`,borderRadius:20,padding:'5px 12px',cursor:'pointer',whiteSpace:'nowrap',fontSize:12,color:emrTmpl.id===t.id?C.accent:C.muted,fontWeight:600}}>{t.label}</div>)}</div>
          {emrTmpl.fields.map(f=><div key={f.k}><div style={{fontSize:12,color:C.muted,marginBottom:4}}>{f.l}</div>{f.ta?<textarea rows={2} value={emrFields[f.k]||''} onChange={e=>setEmrFields({...emrFields,[f.k]:e.target.value})} style={{resize:'none'}}/>:<input value={emrFields[f.k]||''} onChange={e=>setEmrFields({...emrFields,[f.k]:e.target.value})}/>}</div>)}
          <div style={{display:'flex',gap:10}}><Btn full onClick={saveEMR} disabled={saving}>{saving?'Сохранение...':'Сохранить'}</Btn><Btn outline color={C.muted} onClick={()=>setEmrView('list')}>Отмена</Btn></div>
        </div>}
        {emrView==='detail'&&selRec&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card style={{padding:14}}><Row label="Дата" value={selRec.date}/><Row label="Шаблон" value={selRec.template_label}/></Card>
          {EMR_TMPL.find(t=>t.id===selRec.template_id)?.fields.map(f=>selRec.fields?.[f.k]?<div key={f.k}><div style={{fontSize:11,color:C.muted,marginBottom:3}}>{f.l}</div><Card style={{padding:'8px 12px',fontSize:13}}>{selRec.fields[f.k]}</Card></div>:null)}
          <div style={{display:'flex',gap:10}}><Btn outline full color={C.muted} onClick={()=>{setSelRec(null);setEmrView('list');}}>← Назад</Btn><Btn outline color={C.red} onClick={async()=>{await emr.remove(selRec.id);setSelRec(null);setEmrView('list');}}>Удалить</Btn></div>
        </div>}
      </div>}
      {ptab==='history'&&<div style={{display:'flex',flexDirection:'column',gap:8}}>
        {patApps.length===0?<div style={{textAlign:'center',color:C.muted,padding:20}}>Нет приёмов</div>:patApps.map(a=><Card key={a.id} style={{padding:'10px 14px',borderLeft:`4px solid ${STATUS_C[a.status]||C.muted}`}}>
          <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:600,fontSize:13}}>{a.date} {a.time}</span><Badge text={a.status} color={STATUS_C[a.status]||C.muted}/></div>
          <div style={{color:C.muted,fontSize:12,marginTop:3}}>{a.doctor_name||'—'}{a.service?` · ${a.service}`:''}</div>
        </Card>)}
      </div>}
    </Modal>}
  </div>;
}

// ══════════════════════════════════════════════════════════════════════════════
// DOCTORS
// ══════════════════════════════════════════════════════════════════════════════
function DoctorForm({form,setForm,saveDoc,saving,editing,fileRef,handlePhoto,slots,specialties}){
  const[specDrop,setSpecDrop]=useState(false);

  // Специализации хранятся через запятую в form.specialty
  const selSpecs=React.useMemo(()=>form.specialty?form.specialty.split(',').map(s=>s.trim()).filter(Boolean):[],[form.specialty]);
  const toggleS=s=>{
    const cur=selSpecs;
    const next=cur.includes(s)?cur.filter(x=>x!==s):[...cur,s];
    setForm(f=>({...f,specialty:next.join(', ')}));
  };

  // Все доступные специализации — из справочника или вручную
  const allAvail=specialties&&specialties.length>0?specialties.map(s=>s.name):[];

  useEffect(()=>{
    if(!specDrop)return;
    const h=e=>{if(!e.target.closest('[data-docspecdrop]'))setSpecDrop(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[specDrop]);

  return <div style={{display:'flex',flexDirection:'column',gap:12}}>
    <div style={{display:'flex',gap:14,alignItems:'center'}}>
      <div onClick={()=>fileRef.current.click()} style={{cursor:'pointer',flexShrink:0}}>{form.photo?<img src={form.photo} style={{width:64,height:64,borderRadius:'50%',objectFit:'cover',border:`3px solid ${form.color}`}}/>:<div style={{width:64,height:64,borderRadius:'50%',background:form.color+'18',border:`2px dashed ${form.color}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,color:form.color}}>📷</div>}</div>
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePhoto}/>
      <input placeholder="ФИО врача *" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
    </div>

    {/* Мультивыбор специализаций */}
    <div>
      <div style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:500}}>Специализации</div>
      {/* Выбранные теги */}
      {selSpecs.length>0&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
        {selSpecs.map(s=><div key={s} style={{display:'flex',alignItems:'center',gap:4,background:C.accent+'18',border:`1px solid ${C.accent}44`,borderRadius:20,padding:'3px 10px',fontSize:12,color:C.accent}}>
          <span>{s}</span>
          <span onClick={()=>toggleS(s)} style={{cursor:'pointer',fontWeight:700,fontSize:14,lineHeight:1,marginLeft:2}}>×</span>
        </div>)}
      </div>}
      {/* Дропдаун */}
      <div style={{position:'relative'}} data-docspecdrop>
        <button data-docspecdrop type="button" onClick={()=>setSpecDrop(o=>!o)} style={{width:'100%',padding:'10px 14px',background:'#fff',border:`1.5px solid ${specDrop?C.accent:C.border}`,borderRadius:12,textAlign:'left',cursor:'pointer',fontSize:14,color:selSpecs.length>0?C.accent:C.muted,display:'flex',justifyContent:'space-between',alignItems:'center',boxShadow:'0 1px 3px rgba(0,0,0,.05)'}}>
          <span>{selSpecs.length>0?`Выбрано: ${selSpecs.length}`:'Выбрать специализации...'}</span>
          <span style={{fontSize:12}}>{specDrop?'▲':'▼'}</span>
        </button>
        {specDrop&&<div data-docspecdrop style={{position:'absolute',left:0,right:0,top:46,background:'#fff',border:`1.5px solid ${C.border}`,borderRadius:14,boxShadow:'0 8px 32px rgba(0,0,0,.12)',zIndex:200,maxHeight:260,overflowY:'auto',padding:8}}>
          <div style={{padding:'4px 8px 8px',borderBottom:`1px solid ${C.border}`,marginBottom:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:C.muted,fontWeight:600}}>Справочник специализаций</span>
            {selSpecs.length>0&&<button type="button" onClick={()=>setForm(f=>({...f,specialty:''}))} style={{background:'none',border:'none',color:C.accent,fontSize:12,cursor:'pointer',fontWeight:600}}>Сбросить</button>}
          </div>
          {allAvail.length>0?allAvail.map(s=>{
            const on=selSpecs.includes(s);
            return <div key={s} data-docspecdrop onClick={()=>toggleS(s)} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:10,cursor:'pointer',background:on?C.accent+'12':'transparent',marginBottom:2}}>
              <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${on?C.accent:C.border}`,background:on?C.accent:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {on&&<span style={{color:'#fff',fontSize:11,lineHeight:1}}>✓</span>}
              </div>
              <span style={{fontSize:13,color:on?C.accent:C.text,fontWeight:on?600:400}}>{s}</span>
            </div>;
          }):<div style={{padding:'8px 10px',color:C.muted,fontSize:13}}>Справочник пуст — добавьте специализации в раздел 🩺</div>}
          {/* Ввод вручную */}
          <div style={{borderTop:`1px solid ${C.border}`,marginTop:4,paddingTop:8}}>
            <input placeholder="✏️ Добавить свою..." style={{fontSize:13,padding:'7px 10px'}} onKeyDown={e=>{if(e.key==='Enter'&&e.target.value.trim()){toggleS(e.target.value.trim());e.target.value='';}}}/>
            <div style={{fontSize:11,color:C.muted,marginTop:4,paddingLeft:4}}>Нажми Enter чтобы добавить</div>
          </div>
        </div>}
      </div>
    </div>

    <input placeholder="Телефон" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))}/>
    <textarea placeholder="Описание..." rows={3} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} style={{resize:'none'}}/>
    <Card style={{padding:'12px 14px'}}>
      <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Часы работы</div>
      <div style={{display:'flex',gap:10,alignItems:'center'}}><select value={form.work_start} onChange={e=>setForm(f=>({...f,work_start:e.target.value}))} style={{flex:1}}>{slots.map(s=><option key={s}>{s}</option>)}</select><span style={{color:C.muted}}>—</span><select value={form.work_end} onChange={e=>setForm(f=>({...f,work_end:e.target.value}))} style={{flex:1}}>{slots.map(s=><option key={s}>{s}</option>)}</select></div>
    </Card>
    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{DC.map(col=><div key={col} onClick={()=>setForm(f=>({...f,color:col}))} style={{width:28,height:28,borderRadius:'50%',background:col,cursor:'pointer',border:form.color===col?`3px solid ${C.text}`:'3px solid transparent',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}/>)}</div>
    <Btn onClick={saveDoc} full disabled={saving}>{saving?'Сохранение...':(editing?'Сохранить':'Добавить врача')}</Btn>
  </div>;
}

function DoctorsTab({doctors,specialties}){
  const[showAdd,setShowAdd]=useState(false);const[sel,setSel]=useState(null);const[editing,setEditing]=useState(false);
  const ef={name:'',specialty:'',phone:'',description:'',photo:'',color:DC[0],work_start:'08:00',work_end:'18:00',active:true};
  const[form,setForm]=useState({...ef});const[saving,setSaving]=useState(false);const fileRef=useRef();const slots=genSlots('06:00','22:30');
  const[search,setSearch]=useState('');
  const[specFilters,setSpecFilters]=useState([]);
  const[dropOpen,setDropOpen]=useState(false);

  const allSpecs=React.useMemo(()=>[...new Set(doctors.data.map(d=>d.specialty).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ru')),[doctors.data]);

  const toggleSpec=s=>setSpecFilters(prev=>prev.includes(s)?prev.filter(x=>x!==s):[...prev,s]);
  const clearFilters=()=>setSpecFilters([]);

  // Закрыть дропдаун при клике вне
  useEffect(()=>{
    if(!dropOpen) return;
    const handler=e=>{if(!e.target.closest('[data-specdrop]'))setDropOpen(false);};
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[dropOpen]);

  const filtered=doctors.data.filter(d=>{
    const matchSearch=!search||d.name.toLowerCase().includes(search.toLowerCase());
    const matchSpec=specFilters.length===0||specFilters.includes(d.specialty);
    return matchSearch&&matchSpec;
  });
  const handlePhoto=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setForm(x=>({...x,photo:ev.target.result}));r.readAsDataURL(f);};
  const saveDoc=async()=>{
    if(!form.name.trim())return;setSaving(true);
    const data={...form};
    delete data.specialtyCustom;
    if(editing){await doctors.update(sel.id,data);setSel({...sel,...data});setEditing(false);}
    else{await doctors.insert(data);setShowAdd(false);}
    setSaving(false);
  };

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <span style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:700,fontSize:16,color:C.text}}>Врачи ({doctors.data.length})</span>
      <Btn small onClick={()=>{setForm({name:'',specialty:'',phone:'',description:'',photo:'',color:DC[doctors.data.length%DC.length],work_start:'08:00',work_end:'18:00',active:true});setSel(null);setEditing(false);setShowAdd(true);}}>+ Добавить</Btn>
    </div>

    {/* Поиск + фильтр */}
    <div style={{display:'flex',gap:8,marginBottom:10}}>
      <input placeholder="🔍 Поиск по ФИО..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1}}/>
      <div style={{position:'relative',flexShrink:0}}>
        <button data-specdrop onClick={()=>setDropOpen(o=>!o)} style={{height:44,padding:'0 14px',background:specFilters.length>0?C.accent+'18':C.card,border:`1.5px solid ${specFilters.length>0?C.accent:C.border}`,borderRadius:12,color:specFilters.length>0?C.accent:C.muted,fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap'}}>
          🎯 {specFilters.length>0?`Выбрано: ${specFilters.length}`:'Специализация'} {dropOpen?'▲':'▼'}
        </button>
        {dropOpen&&<div data-specdrop style={{position:'absolute',right:0,top:50,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:14,boxShadow:'0 8px 32px rgba(0,0,0,.12)',zIndex:100,minWidth:280,maxHeight:360,overflowY:'auto',padding:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 8px 8px',borderBottom:`1px solid ${C.border}`,marginBottom:4}}>
            <span style={{fontSize:12,fontWeight:600,color:C.muted}}>Специализации ({allSpecs.length})</span>
            {specFilters.length>0&&<button onClick={clearFilters} style={{background:'none',border:'none',color:C.accent,fontSize:12,cursor:'pointer',fontWeight:600}}>Сбросить</button>}
          </div>
          {allSpecs.map(s=>{
            const cnt=doctors.data.filter(d=>d.specialty===s).length;
            const on=specFilters.includes(s);
            return <div key={s} onClick={()=>toggleSpec(s)} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:10,cursor:'pointer',background:on?C.accent+'12':'transparent',marginBottom:2}}>
              <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${on?C.accent:C.border}`,background:on?C.accent:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {on&&<span style={{color:'#fff',fontSize:12,lineHeight:1}}>✓</span>}
              </div>
              <span style={{flex:1,fontSize:13,color:on?C.accent:C.text,fontWeight:on?600:400}}>{s}</span>
              <span style={{fontSize:11,color:C.muted,background:C.bg,borderRadius:10,padding:'1px 7px'}}>{cnt}</span>
            </div>;
          })}
        </div>}
      </div>
    </div>

    {/* Выбранные фильтры — теги */}
    {specFilters.length>0&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
      {specFilters.map(s=><div key={s} style={{display:'flex',alignItems:'center',gap:4,background:C.accent+'18',border:`1px solid ${C.accent}44`,borderRadius:20,padding:'3px 10px',fontSize:12,color:C.accent}}>
        <span>{s}</span>
        <span onClick={()=>toggleSpec(s)} style={{cursor:'pointer',fontWeight:700,fontSize:14,lineHeight:1}}>×</span>
      </div>)}
      <div onClick={clearFilters} style={{cursor:'pointer',fontSize:12,color:C.muted,padding:'3px 8px',textDecoration:'underline'}}>Сбросить всё</div>
    </div>}

    {/* Счётчик */}
    {(search||specFilters.length>0)&&<div style={{fontSize:12,color:C.muted,marginBottom:10}}>
      Найдено: <strong>{filtered.length}</strong> из {doctors.data.length}
    </div>}

    {doctors.loading?<Spinner/>:filtered.length===0?<div style={{textAlign:'center',color:C.muted,padding:40}}>
      <div style={{fontSize:36,marginBottom:8}}>🔍</div>
      <div>Врачи не найдены</div>
      <div style={{fontSize:12,marginTop:6}}><button onClick={()=>{setSearch('');clearFilters();}} style={{background:'none',border:'none',color:C.accent,cursor:'pointer',textDecoration:'underline'}}>Сбросить фильтры</button></div>
    </div>:(
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {filtered.map(d=><Card key={d.id} style={{padding:'14px 16px',opacity:d.active?1:.6,borderLeft:`4px solid ${d.color}`}}>
          <div style={{display:'flex',gap:12,alignItems:'center'}}>
            <DoctorAvatar doctor={d} size={44}/>
            <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>setSel(d)}>
              <div style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:700,fontSize:15,color:C.text}}>{d.name}</div>
              {d.specialty&&<div style={{color:d.color,fontSize:12,marginTop:2}}>{d.specialty}</div>}
              <div style={{color:C.muted,fontSize:11,marginTop:2}}>{d.work_start}–{d.work_end}</div>
            </div>
            <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
              <button onClick={e=>{e.stopPropagation();setForm({name:d.name,specialty:d.specialty||'',phone:d.phone||'',description:d.description||'',photo:d.photo||'',color:d.color||DC[0],work_start:d.work_start||'08:00',work_end:d.work_end||'18:00',active:d.active});setSel(d);setEditing(true);}} style={{background:C.accent+'18',border:`1px solid ${C.accent}33`,borderRadius:8,padding:'5px 10px',fontSize:12,color:C.accent,fontWeight:600,cursor:'pointer'}}>✏️</button>
              <div onClick={e=>{e.stopPropagation();doctors.update(d.id,{active:!d.active});}} style={{background:d.active?C.green+'18':C.muted+'18',border:`1px solid ${d.active?C.green:C.muted}44`,borderRadius:20,padding:'4px 10px',fontSize:11,color:d.active?C.green:C.muted,fontWeight:600,cursor:'pointer'}}>{d.active?'Работает':'Выходной'}</div>
            </div>
          </div>
        </Card>)}
      </div>
    )}
    {showAdd&&<Modal title="Новый врач" onClose={()=>setShowAdd(false)}><DoctorForm form={form} setForm={setForm} saveDoc={saveDoc} saving={saving} editing={false} fileRef={fileRef} handlePhoto={handlePhoto} slots={slots} specialties={specialties}/></Modal>}
    {sel&&!editing&&<Modal title="Карточка врача" onClose={()=>setSel(null)}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div style={{display:'flex',gap:14,alignItems:'center'}}><DoctorAvatar doctor={sel} size={60}/><div><div style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:700,fontSize:18,color:C.text}}>{sel.name}</div>{sel.specialty&&<div style={{color:sel.color,fontSize:14}}>{sel.specialty}</div>}</div></div>
        <Card style={{padding:14}}><Row label="Телефон" value={sel.phone||'—'}/><Row label="Часы" value={`${sel.work_start}–${sel.work_end}`}/>{sel.description&&<div style={{color:C.muted,fontSize:13,marginTop:8,lineHeight:1.5}}>{sel.description}</div>}</Card>
        <div style={{display:'flex',gap:10}}><Btn full outline color={C.accent} onClick={()=>{setForm({name:sel.name,specialty:sel.specialty||'',phone:sel.phone||'',description:sel.description||'',photo:sel.photo||'',color:sel.color||DC[0],work_start:sel.work_start||'08:00',work_end:sel.work_end||'18:00',active:sel.active});setEditing(true);}}>Редактировать</Btn><Btn outline color={C.red} onClick={async()=>{await doctors.remove(sel.id);setSel(null);}}>Удалить</Btn></div>
      </div>
    </Modal>}
    {editing&&<Modal title="Редактировать" onClose={()=>setEditing(false)}><DoctorForm form={form} setForm={setForm} saveDoc={saveDoc} saving={saving} editing={true} fileRef={fileRef} handlePhoto={handlePhoto} slots={slots} specialties={specialties}/></Modal>}
  </div>;
}

// ══════════════════════════════════════════════════════════════════════════════
// FINANCES
// ══════════════════════════════════════════════════════════════════════════════
function FinancesTab({payments,patients,doctors}){
  const[showAdd,setShowAdd]=useState(false);const[filter,setFilter]=useState('all');
  const[form,setForm]=useState({patient_name:'',doctor_name:'',service:'',amount:'',status:'Ожидает',date:today()});const[saving,setSaving]=useState(false);
  const total=payments.data.reduce((s,p)=>s+(p.status==='Оплачено'?Number(p.amount):0),0);
  const pend=payments.data.reduce((s,p)=>s+(p.status==='Ожидает'?Number(p.amount):0),0);
  const debt=payments.data.reduce((s,p)=>s+(p.status==='Долг'?Number(p.amount):0),0);
  const shown=filter==='all'?payments.data:payments.data.filter(p=>p.status===filter);
  const cycle={Ожидает:'Оплачено',Оплачено:'Долг',Долг:'Ожидает'};
  const add=async()=>{if(!form.patient_name.trim()||!form.amount)return;setSaving(true);await payments.insert(form);setForm({patient_name:'',doctor_name:'',service:'',amount:'',status:'Ожидает',date:today()});setShowAdd(false);setSaving(false);};

  return <div>
    <div style={{display:'flex',gap:10,marginBottom:14}}>
      {[{l:'Оплачено',v:total,c:C.green},{l:'Ожидает',v:pend,c:C.orange},{l:'Долг',v:debt,c:C.red}].map(({l,v,c})=>(
        <Card key={l} style={{flex:1,padding:'12px 8px',textAlign:'center',borderTop:`3px solid ${c}`}}>
          <div style={{color:C.muted,fontSize:10,marginBottom:4}}>{l}</div>
          <div style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:700,fontSize:14,color:c}}>{v.toLocaleString()} ₽</div>
        </Card>
      ))}
    </div>
    <div style={{display:'flex',gap:8,marginBottom:12,overflowX:'auto'}}>
      {['all','Оплачено','Ожидает','Долг'].map(f=><div key={f} onClick={()=>setFilter(f)} style={{background:filter===f?C.accent+'18':C.card,border:`1.5px solid ${filter===f?C.accent:C.border}`,borderRadius:20,padding:'5px 14px',cursor:'pointer',whiteSpace:'nowrap',fontSize:12,color:filter===f?C.accent:C.muted,fontWeight:600,flexShrink:0,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>{f==='all'?'Все':f}</div>)}
      <div style={{marginLeft:'auto',flexShrink:0}}><Btn small onClick={()=>setShowAdd(true)}>+ Платёж</Btn></div>
    </div>
    {payments.loading?<Spinner/>:shown.length===0?<div style={{textAlign:'center',color:C.muted,padding:40}}>Нет платежей</div>:(
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {shown.map(p=><Card key={p.id} onClick={()=>payments.update(p.id,{status:cycle[p.status]})} style={{padding:'14px 16px',cursor:'pointer'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:600,color:C.text}}>{p.patient_name}</span><span style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:700,color:PAY_C[p.status]}}>{Number(p.amount).toLocaleString()} ₽</span></div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6,gap:8}}><span style={{color:C.muted,fontSize:13}}>{p.doctor_name||p.service||p.date}</span><Badge text={p.status} color={PAY_C[p.status]}/></div>
        </Card>)}
      </div>
    )}
    {showAdd&&<Modal title="Новый платёж" onClose={()=>setShowAdd(false)}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <input placeholder="Пациент *" value={form.patient_name} onChange={e=>setForm({...form,patient_name:e.target.value})} list="fp2"/>
        <datalist id="fp2">{patients.data.map(p=><option key={p.id} value={p.name}/>)}</datalist>
        <select value={form.doctor_name} onChange={e=>setForm({...form,doctor_name:e.target.value})}><option value="">— Врач —</option>{doctors.data.map(d=><option key={d.id} value={d.name}>{d.name}</option>)}</select>
        <input placeholder="Сумма ₽ *" type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}/>
        <input placeholder="Услуга" value={form.service} onChange={e=>setForm({...form,service:e.target.value})}/>
        <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/>
        <select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>{Object.keys(PAY_C).map(s=><option key={s}>{s}</option>)}</select>
        <Btn onClick={add} full disabled={saving}>{saving?'Сохранение...':'Добавить'}</Btn>
      </div>
    </Modal>}
  </div>;
}

function TasksTab({tasks,doctors}){
  const[showAdd,setShowAdd]=useState(false);const[filter,setFilter]=useState('active');
  const[form,setForm]=useState({title:'',assignee:'',priority:'Средний',due_date:'',notes:''});const[saving,setSaving]=useState(false);
  const PRIO_C={'Высокий':C.red,'Средний':C.orange,'Низкий':C.green};
  const shown=tasks.data.filter(t=>filter==='active'?!t.done:t.done);
  const overdue=t=>!t.done&&t.due_date&&t.due_date<today();
  const save=async()=>{if(!form.title.trim())return;setSaving(true);await tasks.insert({...form,done:false,created_at:today()});setForm({title:'',assignee:'',priority:'Средний',due_date:'',notes:''});setShowAdd(false);setSaving(false);};

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><span style={{fontFamily:'DM Sans,Arial,sans-serif',fontWeight:700,fontSize:16,color:C.text}}>Задачи</span><Btn small onClick={()=>setShowAdd(true)}>+ Задача</Btn></div>
    <div style={{display:'flex',gap:8,marginBottom:14}}>
      {[{id:'active',l:`Активные (${tasks.data.filter(t=>!t.done).length})`},{id:'done',l:`Выполнено (${tasks.data.filter(t=>t.done).length})`}].map(f=>(
        <div key={f.id} onClick={()=>setFilter(f.id)} style={{background:filter===f.id?C.accent+'18':C.card,border:`1.5px solid ${filter===f.id?C.accent:C.border}`,borderRadius:20,padding:'6px 14px',cursor:'pointer',fontSize:12,color:filter===f.id?C.accent:C.muted,fontWeight:600,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>{f.l}</div>
      ))}
    </div>
    {tasks.loading?<Spinner/>:shown.length===0?<div style={{textAlign:'center',color:C.muted,padding:40}}>Задач нет</div>:(
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {shown.map(t=><Card key={t.id} style={{padding:'12px 14px',borderLeft:`4px solid ${overdue(t)?C.red:PRIO_C[t.priority]||C.muted}`}}>
          <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
            <div onClick={()=>tasks.update(t.id,{done:!t.done})} style={{width:22,height:22,borderRadius:6,border:`2px solid ${t.done?C.green:C.border}`,background:t.done?C.green+'18':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,marginTop:1,color:C.green,fontSize:14}}>{t.done?'✓':''}</div>
            <div style={{flex:1}}><div style={{fontWeight:600,textDecoration:t.done?'line-through':'none',color:t.done?C.muted:C.text}}>{t.title}</div>
            <div style={{display:'flex',gap:8,marginTop:4,flexWrap:'wrap',alignItems:'center'}}>{t.assignee&&<span style={{fontSize:11,color:C.muted}}>{t.assignee}</span>}<Badge text={t.priority} color={PRIO_C[t.priority]||C.muted}/>{t.due_date&&<span style={{fontSize:11,color:overdue(t)?C.red:C.muted}}>{overdue(t)?'⚠ ':''}{t.due_date}</span>}</div></div>
            <button onClick={()=>tasks.remove(t.id)} style={{background:'none',color:C.muted,fontSize:18,padding:0,flexShrink:0}}>×</button>
          </div>
        </Card>)}
      </div>
    )}
    {showAdd&&<Modal title="Новая задача" onClose={()=>setShowAdd(false)}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <input placeholder="Задача *" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
        <input placeholder="Ответственный" value={form.assignee} onChange={e=>setForm({...form,assignee:e.target.value})} list="dnames2"/>
        <datalist id="dnames2">{doctors.data.map(d=><option key={d.id} value={d.name}/>)}</datalist>
        <select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})}><option>Высокий</option><option>Средний</option><option>Низкий</option></select>
        <input type="date" value={form.due_date} onChange={e=>setForm({...form,due_date:e.target.value})}/>
        <Btn onClick={save} full disabled={saving}>{saving?'Сохранение...':'Добавить'}</Btn>
      </div>
    </Modal>}
  </div>;
}

function VisitsTab({user,patients,doctors,appts}){
  const visits=useTable('clinic_visits','created_at',false);
  const[selVisit,setSelVisit]=useState(null);
  const[selAppt,setSelAppt]=useState(null); // запись из расписания без визита
  const[newVisit,setNewVisit]=useState(null);
  const[search,setSearch]=useState('');
  const[filterStatus,setFilterStatus]=useState('all');
  const[filterDoc,setFilterDoc]=useState('');
  const[screen,setScreen]=useState('list');

  const myDoctor=user?.role==='doctor'?doctors.data.find(d=>String(d.id)===String(user.doctor_id)):null;

  // Объединяем: сначала заполненные визиты, потом записи из расписания без визита
  const combined=React.useMemo(()=>{
    // Все appointment_id у которых уже есть визит
    const linkedApptIds=new Set(visits.data.map(v=>v.appointment_id).filter(Boolean));

    // Записи из расписания без визита — конвертируем в визит-заглушку
    const apptItems=appts.data
      .filter(a=>!linkedApptIds.has(a.id))
      .map(a=>({
        _type:'appt', id:'appt_'+a.id, appt_id:a.id,
        patient_name:a.patient_name, patient_id:a.patient_id,
        doctor_name:a.doctor_name, doctor_id:a.doctor_id,
        date:a.date, time:a.time, service:a.service,
        status:a.status==='Завершён'?'Завершён':a.status==='Отменён'?'Отменён':'Запланирован',
        visit_status:null // нет визита
      }));

    // Заполненные визиты
    const visitItems=visits.data.map(v=>({...v,_type:'visit'}));

    return [...visitItems,...apptItems].sort((a,b)=>{
      const da=a.date||'';const db=b.date||'';
      return db.localeCompare(da);
    });
  },[visits.data,appts.data]);

  const filtered=React.useMemo(()=>combined.filter(v=>{
    if(myDoctor&&String(v.doctor_id)!==String(myDoctor.id))return false;
    if(search&&!v.patient_name?.toLowerCase().includes(search.toLowerCase())&&!v.doctor_name?.toLowerCase().includes(search.toLowerCase()))return false;
    if(filterDoc&&String(v.doctor_id)!==String(filterDoc))return false;
    if(filterStatus!=='all'){
      if(filterStatus==='С визитом'&&v._type!=='visit')return false;
      if(filterStatus==='Без визита'&&v._type!=='appt')return false;
      if(filterStatus==='Завершён'&&v.status!=='Завершён')return false;
    }
    return true;
  }),[combined,search,filterStatus,filterDoc,myDoctor]);

  const saveVisit=async(data)=>{
    if(selVisit&&selVisit._type==='visit'){
      await visits.update(selVisit.id,data);
      setSelVisit({...selVisit,...data,_type:'visit'});
    } else {
      const ins=await visits.insert(data);
      setSelVisit({...ins,_type:'visit'});
    }
    setScreen('view');
  };

  const openFormFromAppt=(item)=>{
    // Открываем форму нового визита с данными из записи расписания
    const patient=patients.data.find(p=>String(p.id)===String(item.patient_id))||{id:item.patient_id,name:item.patient_name};
    const doctor=doctors.data.find(d=>String(d.id)===String(item.doctor_id))||{id:item.doctor_id,name:item.doctor_name};
    setNewVisit({patient,doctor,appointment_id:item.appt_id,date:item.date,service:item.service});
    setSelVisit(null);
    setScreen('form');
  };

  const STATUS_V={'Черновик':C.orange,'Завершён':C.green,'Отменён':C.red,'Запланирован':C.accent,'Пришёл':C.purple};

  // Экран просмотра визита
  if(screen==='view'&&selVisit&&selVisit._type==='visit') return <div>
    <button onClick={()=>setScreen('list')} style={{background:'none',border:'none',color:C.accent,fontWeight:600,fontSize:14,cursor:'pointer',padding:'0 0 12px',display:'flex',alignItems:'center',gap:4}}>← Все визиты</button>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <div>
        <div style={{fontWeight:700,fontSize:17,color:C.text}}>{selVisit.patient_name}</div>
        <div style={{color:C.muted,fontSize:12,marginTop:2}}>{selVisit.doctor_name} · {selVisit.date} · <Badge text={selVisit.status} color={STATUS_V[selVisit.status]||C.muted}/></div>
      </div>
      <Btn small outline color={C.accent} onClick={()=>setScreen('form')}>✏️ Редактировать</Btn>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {selVisit.visit_type&&<div style={{display:'inline-block',background:C.purple+'18',color:C.purple,borderRadius:20,padding:'3px 12px',fontSize:12,fontWeight:600}}>{selVisit.visit_type}</div>}
      {selVisit.complaints&&<Card style={{padding:14}}><div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:.5,marginBottom:6}}>ЖАЛОБЫ</div><div style={{fontSize:13,lineHeight:1.6}}>{selVisit.complaints}</div></Card>}
      {selVisit.anamnesis&&<Card style={{padding:14}}><div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:.5,marginBottom:6}}>АНАМНЕЗ</div><div style={{fontSize:13,lineHeight:1.6}}>{selVisit.anamnesis}</div></Card>}
      {selVisit.general_condition&&<Card style={{padding:14}}><div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:.5,marginBottom:6}}>ОБЩЕЕ СОСТОЯНИЕ</div><div style={{fontSize:13}}>{selVisit.general_condition}</div></Card>}
      {selVisit.exam_systems&&Object.keys(selVisit.exam_systems).filter(k=>selVisit.exam_systems[k]).length>0&&
        <Card style={{padding:14}}><div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:.5,marginBottom:8}}>ОСМОТР ПО СИСТЕМАМ</div>
          {EXAM_SYSTEMS.filter(s=>selVisit.exam_systems[s.k]).map(s=><div key={s.k} style={{marginBottom:8}}><div style={{fontSize:11,color:C.muted,marginBottom:2}}>{s.l}</div><div style={{fontSize:13}}>{selVisit.exam_systems[s.k]}</div></div>)}
        </Card>}
      {selVisit.diagnosis&&<Card style={{padding:14,borderLeft:`4px solid ${C.red}`}}><div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:.5,marginBottom:6}}>ДИАГНОЗ {selVisit.diagnosis_code&&<span style={{color:C.accent,marginLeft:6}}>{selVisit.diagnosis_code}</span>}</div><div style={{fontSize:14,fontWeight:600,color:C.text}}>{selVisit.diagnosis}</div>{selVisit.diagnosis_type&&<div style={{fontSize:11,color:C.muted,marginTop:4}}>{selVisit.diagnosis_type}</div>}</Card>}
      {selVisit.prescription&&<Card style={{padding:14,borderLeft:`4px solid ${C.green}`}}><div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:.5,marginBottom:6}}>НАЗНАЧЕНИЯ</div><div style={{fontSize:13,lineHeight:1.7,whiteSpace:'pre-wrap'}}>{selVisit.prescription}</div></Card>}
      {selVisit.procedures&&<Card style={{padding:14}}><div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:.5,marginBottom:6}}>ПРОЦЕДУРЫ</div><div style={{fontSize:13}}>{selVisit.procedures}</div></Card>}
      {selVisit.referrals&&<Card style={{padding:14}}><div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:.5,marginBottom:6}}>НАПРАВЛЕНИЯ</div><div style={{fontSize:13}}>{selVisit.referrals}</div></Card>}
      {selVisit.sick_leave&&<Card style={{padding:14,borderLeft:`4px solid ${C.orange}`}}><div style={{fontSize:13,fontWeight:600}}>🏥 Больничный лист{selVisit.sick_leave_days?` — ${selVisit.sick_leave_days} дней`:''}</div></Card>}
      {selVisit.next_visit&&<Card style={{padding:14}}><div style={{fontSize:11,color:C.muted,marginBottom:4}}>Следующий визит</div><div style={{fontSize:14,fontWeight:600,color:C.accent}}>{selVisit.next_visit}</div></Card>}
      {selVisit.files?.length>0&&<Card style={{padding:14}}><div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:.5,marginBottom:8}}>ФАЙЛЫ ({selVisit.files.length})</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {selVisit.files.map((f,i)=><div key={i} style={{display:'flex',gap:10,alignItems:'center'}}>
            <span style={{fontSize:18}}>{f.type?.startsWith('image')?'🖼️':'📄'}</span>
            <span style={{flex:1,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
            {f.type?.startsWith('image')&&f.data&&<img src={f.data} style={{width:48,height:48,objectFit:'cover',borderRadius:8}}/>}
          </div>)}
        </div>
      </Card>}
    </div>
  </div>;

  // Экран формы визита
  if(screen==='form') return <div>
    <button onClick={()=>setScreen(selVisit?'view':'list')} style={{background:'none',border:'none',color:C.accent,fontWeight:600,fontSize:14,cursor:'pointer',padding:'0 0 12px',display:'flex',alignItems:'center',gap:4}}>← Назад</button>
    <div style={{fontWeight:700,fontSize:16,color:C.text,marginBottom:4}}>{selVisit?'Редактировать визит':'Новый визит'}</div>
    {(newVisit||selVisit)&&<div style={{display:'flex',gap:10,alignItems:'center',background:C.bg,borderRadius:12,padding:'10px 14px',marginBottom:14,border:`1px solid ${C.border}`}}>
      <span style={{fontSize:18}}>👤</span>
      <div>
        <div style={{fontWeight:600,fontSize:14}}>{newVisit?.patient?.name||selVisit?.patient_name}</div>
        <div style={{fontSize:12,color:C.muted}}>{newVisit?.doctor?.name||selVisit?.doctor_name}{newVisit?.date?` · ${newVisit.date}`:''}</div>
        {newVisit?.service&&<div style={{fontSize:12,color:C.accent,marginTop:2}}>{newVisit.service}</div>}
      </div>
    </div>}
    <VisitForm
      visit={selVisit&&selVisit._type==='visit'?selVisit:null}
      patient={newVisit?.patient||{id:selVisit?.patient_id,name:selVisit?.patient_name}}
      doctor={newVisit?.doctor||{id:selVisit?.doctor_id,name:selVisit?.doctor_name}}
      appointmentId={newVisit?.appointment_id||selVisit?.appointment_id}
      onSave={saveVisit}
      onClose={()=>setScreen(selVisit?'view':'list')}/>
  </div>;

  // Список
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <span style={{fontWeight:700,fontSize:16,color:C.text}}>Визиты ({filtered.length})</span>
      <Btn small onClick={()=>{setSelVisit(null);setNewVisit({patient:patients.data[0]||null,doctor:myDoctor||doctors.data[0]});setScreen('form');}}>+ Визит</Btn>
    </div>

    <input placeholder="🔍 Поиск по пациенту или врачу..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:10}}/>

    <div style={{display:'flex',gap:8,marginBottom:12,overflowX:'auto'}}>
      {[
        {id:'all',l:'Все'},
        {id:'С визитом',l:'Заполнен'},
        {id:'Без визита',l:'Без осмотра'},
        {id:'Завершён',l:'Завершён'},
      ].map(s=><div key={s.id} onClick={()=>setFilterStatus(s.id)} style={{background:filterStatus===s.id?C.accent+'18':C.card,border:`1.5px solid ${filterStatus===s.id?C.accent:C.border}`,borderRadius:20,padding:'5px 14px',cursor:'pointer',whiteSpace:'nowrap',fontSize:12,color:filterStatus===s.id?C.accent:C.muted,fontWeight:600,flexShrink:0}}>{s.l}</div>)}
      {user?.role!=='doctor'&&<select value={filterDoc} onChange={e=>setFilterDoc(e.target.value)} style={{marginLeft:'auto',width:'auto',minWidth:140,fontSize:12,padding:'5px 10px',height:34}}>
        <option value="">Все врачи</option>
        {doctors.data.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
      </select>}
    </div>

    {(visits.loading||appts.loading)?<Spinner/>:filtered.length===0?<div style={{textAlign:'center',color:C.muted,padding:50}}>
      <div style={{fontSize:40,marginBottom:12}}>📋</div><div>Визитов нет</div>
    </div>:(
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {filtered.map(v=>{
          const isAppt=v._type==='appt';
          const borderColor=isAppt?(STATUS_C[v.status]||C.muted):(v.status==='Завершён'?C.green:v.status==='Черновик'?C.orange:C.muted);
          return <Card key={v.id} onClick={()=>{
            if(isAppt){openFormFromAppt(v);}
            else{setSelVisit(v);setScreen('view');}
          }} style={{padding:'14px 16px',cursor:'pointer',borderLeft:`4px solid ${borderColor}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
              <div style={{fontWeight:700,fontSize:15,color:C.text}}>{v.patient_name}</div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                {isAppt&&<div style={{background:C.orange+'18',color:C.orange,border:`1px solid ${C.orange}33`,borderRadius:20,padding:'2px 8px',fontSize:10,fontWeight:700}}>БЕЗ ОСМОТРА</div>}
                <Badge text={v.status} color={borderColor}/>
              </div>
            </div>
            <div style={{color:C.muted,fontSize:12}}>{v.doctor_name} · {v.date}{v.time?` · ${v.time}`:''}</div>
            {v.service&&<div style={{fontSize:12,color:C.teal,marginTop:3}}>{v.service}</div>}
            {!isAppt&&v.diagnosis&&<div style={{fontSize:12,color:C.accent,marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>Dx: {v.diagnosis}</div>}
            {!isAppt&&v.files?.length>0&&<div style={{fontSize:11,color:C.muted,marginTop:3}}>📎 {v.files.length} файл(ов)</div>}
            {isAppt&&<div style={{fontSize:11,color:C.orange,marginTop:4,fontWeight:500}}>→ Нажмите чтобы заполнить осмотр</div>}
          </Card>;
        })}
      </div>
    )}
  </div>;
}

// SPECIALTIES (справочник специализаций)
// ══════════════════════════════════════════════════════════════════════════════
function SpecialtiesTab({specialties,setSpecialties,doctors}){
  const[showAdd,setShowAdd]=useState(false);
  const[name,setName]=useState('');
  const[desc,setDesc]=useState('');
  const[saving,setSaving]=useState(false);
  const[search,setSearch]=useState('');
  const[editSel,setEditSel]=useState(null);
  const[editName,setEditName]=useState('');

  const save=async()=>{
    if(!name.trim())return;
    setSaving(true);
    const existing=specialties.find(s=>s.name.toLowerCase()===name.toLowerCase());
    if(existing){setSaving(false);return;}
    const newS={id:Date.now(),name:name.trim(),desc:desc.trim()};
    const updated=[...specialties,newS].sort((a,b)=>a.name.localeCompare(b.name,'ru'));
    setSpecialties(updated);
    await db.from('clinic_settings').upsert({key:'specialties',value:JSON.stringify(updated)});
    setName('');setDesc('');setShowAdd(false);setSaving(false);
  };

  const remove=async(id)=>{
    const updated=specialties.filter(s=>s.id!==id);
    setSpecialties(updated);
    await db.from('clinic_settings').upsert({key:'specialties',value:JSON.stringify(updated)});
  };

  const saveEdit=async()=>{
    if(!editName.trim())return;
    setSaving(true);
    const updated=specialties.map(s=>s.id===editSel.id?{...s,name:editName.trim()}:s);
    setSpecialties(updated);
    await db.from('clinic_settings').upsert({key:'specialties',value:JSON.stringify(updated)});
    setEditSel(null);setSaving(false);
  };

  // Фильтрация по поиску
  const filtered=specialties.filter(s=>s.name.toLowerCase().includes(search.toLowerCase()));

  // Считаем сколько врачей с каждой специализацией
  const docCount=s=>doctors?doctors.data.filter(d=>d.specialty&&d.specialty.includes(s.name)).length:0;

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <span style={{fontWeight:700,fontSize:16,color:C.text}}>Специализации ({specialties.length})</span>
      <Btn small onClick={()=>{setName('');setDesc('');setShowAdd(true);}}>+ Добавить</Btn>
    </div>

    {/* Поиск */}
    <input placeholder="🔍 Поиск по названию..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:10}}/>

    {/* Счётчик */}
    {search&&<div style={{fontSize:12,color:C.muted,marginBottom:10}}>Найдено: <strong>{filtered.length}</strong> из {specialties.length}</div>}

    {specialties.length===0?<div style={{textAlign:'center',color:C.muted,padding:40}}>
      <div style={{fontSize:40,marginBottom:12}}>🩺</div>
      <div>Добавьте специализации врачей</div>
      <div style={{fontSize:12,color:C.muted2,marginTop:6}}>Например: Терапевт, Хирург, Стоматолог...</div>
    </div>:filtered.length===0?<div style={{textAlign:'center',color:C.muted,padding:30}}>
      <div style={{fontSize:30,marginBottom:8}}>🔍</div>
      <div>Ничего не найдено</div>
      <button onClick={()=>setSearch('')} style={{background:'none',border:'none',color:C.accent,cursor:'pointer',fontSize:12,marginTop:6,textDecoration:'underline'}}>Сбросить</button>
    </div>:(
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {filtered.map((s,i)=>{
          const cnt=docCount(s);
          return <Card key={s.id} style={{padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
            <div style={{display:'flex',alignItems:'center',gap:12,flex:1,minWidth:0}}>
              <div style={{width:32,height:32,borderRadius:10,background:C.accent+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:C.accent,flexShrink:0}}>{i+1}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:14,color:C.text}}>{s.name}</div>
                {s.desc&&<div style={{color:C.muted,fontSize:12,marginTop:2}}>{s.desc}</div>}
              </div>
              {cnt>0&&<div style={{background:C.green+'18',border:`1px solid ${C.green}33`,borderRadius:20,padding:'2px 10px',fontSize:11,color:C.green,fontWeight:600,flexShrink:0}}>{cnt} врач{cnt===1?'':cnt<5?'а':'ей'}</div>}
            </div>
            <div style={{display:'flex',gap:6,flexShrink:0}}>
              <button onClick={()=>{setEditSel(s);setEditName(s.name);}} style={{background:C.accent+'18',border:`1px solid ${C.accent}33`,borderRadius:8,padding:'5px 8px',fontSize:12,color:C.accent,cursor:'pointer'}}>✏️</button>
              <button onClick={()=>remove(s.id)} style={{background:C.red+'18',border:`1px solid ${C.red}33`,borderRadius:8,padding:'5px 8px',fontSize:12,color:C.red,cursor:'pointer'}}>×</button>
            </div>
          </Card>;
        })}
      </div>
    )}

    {showAdd&&<Modal title="Новая специализация" onClose={()=>setShowAdd(false)}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <input placeholder="Название * (напр. Терапевт)" value={name} onChange={e=>setName(e.target.value)} autoFocus/>
        <input placeholder="Описание (необязательно)" value={desc} onChange={e=>setDesc(e.target.value)}/>
        <Btn onClick={save} full disabled={saving}>{saving?'Сохранение...':'Добавить'}</Btn>
      </div>
    </Modal>}

    {editSel&&<Modal title="Редактировать специализацию" onClose={()=>setEditSel(null)}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <input value={editName} onChange={e=>setEditName(e.target.value)} autoFocus/>
        <div style={{display:'flex',gap:10}}>
          <Btn full onClick={saveEdit} disabled={saving}>{saving?'Сохранение...':'Сохранить'}</Btn>
          <Btn outline color={C.red} onClick={()=>{remove(editSel.id);setEditSel(null);}}>Удалить</Btn>
        </div>
      </div>
    </Modal>}
  </div>;
}
